<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>coder-crew</title>
<style>
  :root{
    /* default = Graphite (see THEMES; the swatch row in the sidebar foot swaps these) */
    --bg:#16171a; --sidebar:#101113; --panel:#1e2024; --panel-2:#26282d; --line:#2f323a;
    --ink:#e8eaed; --ink-dim:#a3a8b2; --ink-faint:#6b7079;
    --amber:#7aa2f7; --amber-soft:#1e2740;
    --ok:#9ece6a; --warn:#e0af68; --bad:#f7768e;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Consolas,monospace;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  a{color:var(--amber)}
  .wrap{max-width:1040px;margin:0 auto;padding:18px 16px 64px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    margin:0;color:var(--ink);white-space:nowrap}
  h1 .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
    background:var(--ink-faint);margin-right:9px;vertical-align:middle;transition:.3s}
  h1 .dot.live{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .host{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-left:auto}
  .hidden{display:none!important}

  /* section nav */
  nav.tabs{display:flex;gap:6px}
  .tab{font-family:var(--sans);cursor:pointer;border:1px solid var(--line);
    background:var(--panel);color:var(--ink-dim);border-radius:8px;
    font-size:12px;font-weight:600;letter-spacing:.04em;padding:7px 14px;transition:.12s}
  .tab:hover{color:var(--ink);border-color:#4a3f33}
  .tab.active{background:var(--amber-soft);color:var(--amber);border-color:#4a3a1c}
  .tab .pip{display:inline-block;min-width:16px;padding:0 4px;margin-left:7px;
    font-size:10px;border-radius:7px;background:var(--bad);color:#1a1206;font-weight:700}

  /* token gate */
  .gate{max-width:420px;margin:14vh auto;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:26px}
  .gate h2{margin:0 0 4px;font-size:16px;letter-spacing:.04em}
  .gate p{color:var(--ink-dim);font-size:13px;margin:0 0 16px}
  input[type=password],input[type=text],input[type=number],textarea,select{
    width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:13px;padding:10px 12px;border-radius:8px}
  textarea{font-family:var(--sans);min-height:62px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--amber);outline-offset:0}
  button{font-family:var(--sans);cursor:pointer;border:none;border-radius:8px;
    font-size:13px;font-weight:500;padding:9px 13px;transition:.12s;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line)}
  button:hover{border-color:var(--amber);color:var(--amber)}
  button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  button.primary{background:var(--amber);color:#1a1206;border-color:var(--amber);font-weight:600}
  button.primary:hover{filter:brightness(1.07);color:#1a1206}
  button.danger:hover{border-color:var(--bad);color:var(--bad)}
  button:disabled{opacity:.45;cursor:not-allowed;border-color:var(--line);color:var(--ink-faint)}
  .err{color:var(--bad);font-size:12px;min-height:16px;margin-top:10px}

  /* vitals — system signature row */
  .vitals{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
  .vital{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 14px}
  .vital .k{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
  .vital .v{font-family:var(--mono);font-size:23px;margin:5px 0 8px;font-variant-numeric:tabular-nums}
  .vital .v small{font-size:12px;color:var(--ink-dim)}
  .bar{height:3px;background:var(--amber-soft);border-radius:2px;overflow:hidden}
  .bar > span{display:block;height:100%;background:var(--amber);width:0;transition:width .5s ease}
  .vital .sub{font-size:11px;color:var(--ink-faint);margin-top:7px;font-family:var(--mono)}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px 16px}
  .card h3{margin:0 0 12px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-dim);font-weight:600}
  .row{display:flex;justify-content:space-between;gap:10px;font-family:var(--mono);
    font-size:12px;padding:4px 0;border-bottom:1px solid var(--panel-2)}
  .row:last-child{border-bottom:none}
  .row .name{color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .num{color:var(--ink);font-variant-numeric:tabular-nums;flex:none}
  .actions{display:flex;flex-wrap:wrap;gap:8px}
  .act .badge{font-size:9px;letter-spacing:.1em;color:var(--ink-faint);margin-left:7px;text-transform:uppercase}
  .act.destructive:hover{border-color:var(--bad);color:var(--bad)}
  .full{grid-column:1/-1}
  .log{font-family:var(--mono);font-size:12px;max-height:230px;overflow:auto}
  .log .line{padding:5px 0;border-bottom:1px solid var(--panel-2);display:flex;gap:9px;align-items:flex-start}
  .log .t{color:var(--ink-faint);flex:none}
  .log .m{color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .log .m.ok{color:var(--ok)} .log .m.bad{color:var(--bad)}
  .hint{color:var(--ink-faint);font-size:11px;margin-top:9px}

  /* fleet instruments */
  .instruments{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .gauge{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 14px}
  .gauge.alarm{border-color:var(--bad);box-shadow:0 0 0 1px var(--bad) inset}
  .gauge .g-label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
  .gauge .g-val{font-family:var(--mono);font-size:22px;font-variant-numeric:tabular-nums}
  .pool{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 14px}
  .pool .pr{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-dim)}
  .pool .pr b{font-family:var(--mono);color:var(--ink)}
  .pool .track{height:5px;background:var(--amber-soft);border-radius:3px;overflow:hidden;margin:7px 0}
  .pool .fill{height:100%;background:var(--amber);width:0}
  .pool .fill.warn{background:var(--warn)} .pool .fill.hot{background:var(--bad)}
  .pool .cap{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-faint);font-family:var(--mono)}

  /* inbox */
  .inbox{background:#2a1f16;border:1px solid #5a3a1c;border-radius:11px;padding:12px 14px;margin-bottom:14px}
  .inbox h4{margin:0 0 8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--warn)}
  .inbox-item{display:flex;gap:10px;align-items:center;font-size:12px;padding:4px 0;flex-wrap:wrap}
  .inbox-item .ii-proj{font-weight:600}
  .inbox-item .ii-tool{color:var(--ink-dim)}
  .inbox-item .ii-wait{color:var(--ink-faint);font-family:var(--mono);font-size:11px}
  .inbox-item .ii-jump{margin-left:auto;color:var(--amber);text-decoration:none;font-weight:600}

  /* projects + sessions */
  .project{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px 16px;margin-bottom:14px}
  .project-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px}
  .project-head h3{margin:0;font-size:13px;letter-spacing:.04em;text-transform:none;color:var(--ink)}
  .sess-count{display:inline-block;margin-left:8px;font-size:11px;color:var(--ink-faint);font-family:var(--mono)}
  .ho-tag{font-size:9px;letter-spacing:.1em;background:var(--amber-soft);color:var(--amber);
    padding:2px 6px;border-radius:5px;margin-right:6px}
  .handoff-title{font-size:11px;color:var(--ink-dim)}
  .handoff-none{font-size:11px;color:var(--ink-faint)}
  .handoff-flags{font-size:11px;margin-left:auto}
  .handoff-flags summary{cursor:pointer;color:var(--warn)}
  .handoff-flags ul{margin:6px 0 0;padding-left:18px;color:var(--ink-dim)}
  .spawn{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:end;margin-bottom:12px}
  .spawn textarea{grid-column:1/-1;min-height:48px}
  .ctl{display:flex;flex-direction:column;gap:3px}
  .ctl label{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
  .ctl input,.ctl select{width:auto;min-width:84px}
  .spawn .auto-tog{margin-top:0;gap:6px;padding-bottom:6px;white-space:nowrap}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .scard{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:12px 13px}
  .scard[data-status="blocked"]{border-color:#5a3a1c}
  .scard-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--ink-dim)}
  .led{width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}
  .scard[data-status="running"] .led{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .scard[data-status="blocked"] .led{background:var(--warn);box-shadow:0 0 6px var(--warn)}
  .scard[data-status="idle"] .led{background:var(--amber)}
  .scard[data-status="error"] .led{background:var(--bad)}
  .model-chip{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-faint);
    border:1px solid var(--line);padding:1px 6px;border-radius:6px}
  .badge{font-size:9px;letter-spacing:.06em;padding:1px 6px;border-radius:5px;
    background:var(--amber-soft);color:var(--amber)}
  .metrics{display:flex;gap:14px;font-size:11px;color:var(--ink-faint);margin-bottom:8px}
  .metrics b{display:block;color:var(--ink);font-family:var(--mono);font-size:13px}
  .metrics .over b{color:var(--bad)}
  .ctx-track{height:3px;background:var(--amber-soft);border-radius:2px;overflow:hidden;margin-bottom:3px}
  .ctx-track > div{height:100%;background:var(--amber)}
  .ctx-track > div.warn{background:var(--warn)} .ctx-track > div.hot{background:var(--bad)}
  .ctx-label{font-size:10px;color:var(--ink-faint);font-family:var(--mono);margin-bottom:8px}
  .snippet{font-size:12px;color:var(--ink-dim);margin-bottom:9px;max-height:54px;overflow:hidden}
  .scard .actions button{padding:6px 10px;font-size:12px}
  .chat-open{width:100%;margin-top:8px;background:var(--panel);border-color:var(--line)}

  /* swarm panel */
  .swarm-counts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .sw-count{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:8px 14px;min-width:78px;text-align:center}
  .sw-count b{display:block;font-size:21px;font-family:var(--mono);line-height:1.1}
  .sw-count .hint{font-size:10px}
  .sw-count.inprog b{color:var(--warn)} .sw-count.done b{color:var(--ok)} .sw-count.flagged b{color:var(--bad)}
  .sw-filters{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 12px}
  .sw-filters button{padding:4px 11px;font-size:12px}
  .sw-filters button.on{border-color:var(--amber);color:var(--amber)}
  .sw-task{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);
    border-radius:9px;margin-bottom:7px;background:var(--panel)}
  .sw-task .st{font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;
    border-radius:5px;background:var(--amber-soft);color:var(--amber);white-space:nowrap;margin-top:2px}
  .sw-task .st.flagged{background:#3a1c1c;color:var(--bad)}
  .sw-task .st.done{background:#173021;color:var(--ok)}
  .sw-task .st.cancelled{background:var(--panel-2);color:var(--ink-faint)}
  .sw-task .st.in_progress{background:#3a2f16;color:var(--warn)}
  .sw-task .body{flex:1;min-width:0}
  .sw-task .desc{font-size:13px;color:var(--ink);word-break:break-word;white-space:pre-wrap}
  .sw-task .meta{font-size:11px;color:var(--ink-faint);margin-top:3px;font-family:var(--mono)}
  .sw-task .err{font-size:11px;color:var(--bad);margin-top:4px;word-break:break-word}
  .sw-task .acts{display:flex;gap:5px;flex:none}
  .sw-task .acts button{padding:4px 9px;font-size:12px}
  .sw-flagged-card{border-color:var(--bad)!important}
  .sw-flagged-card h3{color:var(--bad)}

  /* pending approval panel */
  .pending{background:#2a1f16;border:1px solid #5a3a1c;border-radius:8px;padding:10px;margin-bottom:9px}
  .pending h5{margin:0 0 7px;font-size:11px;color:var(--warn)}
  .pending pre{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px;
    font-size:11px;max-height:140px;overflow-y:auto;overflow-x:hidden;color:var(--ink-dim);
    white-space:pre-wrap;word-break:break-word}
  .opt{display:block;width:100%;text-align:left;margin-bottom:5px}
  .opt.selected{border-color:var(--amber);color:var(--amber)}
  .opt small{display:block;color:var(--ink-faint);font-weight:400}

  /* modal (chat + new project) */
  .overlay{position:fixed;inset:0;background:rgba(8,6,4,.72);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:18px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:13px;
    width:100%;max-width:560px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .modal.wide{max-width:760px}
  .modal-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:13px;letter-spacing:.06em}
  .modal-head .x{margin-left:auto;background:none;border:none;color:var(--ink-faint);font-size:16px;padding:2px 8px}
  .modal-body{padding:14px 16px;overflow:auto}
  .modal-body label{display:block;font-size:11px;color:var(--ink-dim);margin:0 0 11px}
  .modal-body label > input,.modal-body label > textarea,.modal-body label > select{margin-top:4px}
  .np-row{display:flex;gap:10px} .np-row label{flex:1}
  .np-check{display:flex;align-items:center;gap:8px} .np-check input{width:auto}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--line)}
  .chat-msgs{flex:1;overflow:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:200px}
  .bubble{max-width:88%;padding:9px 12px;border-radius:10px;font-size:13px;word-break:break-word}
  .bubble .b-role{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px}
  .bubble .b-text{white-space:pre-wrap}
  /* session logs browser */
  .hist-body{padding:12px 14px;overflow:auto;min-height:200px}
  .hist-row{display:block;width:100%;text-align:left;background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
  .hist-row:hover{border-color:var(--amber)}
  .hr-top{display:flex;gap:8px;align-items:center;margin-bottom:3px}
  .hr-proj{font-weight:600;font-size:12px;color:var(--ink)}
  .hr-status{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint)}
  .hr-prompt{font-size:12px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hr-meta{font-size:10px;color:var(--ink-faint);font-family:var(--mono);margin-top:4px}
  .hist-back{background:none;border:none;color:var(--amber);cursor:pointer;font-size:12px;padding:0 8px 0 0}
  .hist-chat{display:flex;flex-direction:column;gap:10px}
  /* slash-command autocomplete popover */
  .slash-pop{position:absolute;left:0;right:0;bottom:calc(100% + 6px);background:var(--panel);
    border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 26px rgba(0,0,0,.45);
    overflow:hidden auto;max-height:210px;z-index:60}
  .slash-item{display:flex;gap:9px;align-items:baseline;padding:7px 11px;cursor:pointer}
  .slash-item b{color:var(--amber);font-family:var(--mono);font-size:12px}
  .slash-item span{color:var(--ink-faint);font-size:11px}
  .slash-item:hover,.slash-item.on{background:var(--panel-2)}
  .bubble.user{align-self:flex-end;background:var(--amber-soft);border:1px solid #4a3a1c}
  .bubble.assistant{align-self:flex-start;background:var(--panel-2);border:1px solid var(--line)}
  .chat-foot{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line)}
  .chat-foot textarea{min-height:40px}
  /* tool-permission mode toggle (auto / plan) */
  .modebar{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .modebar.in-card{margin:9px 0 2px}
  .modebar-row{padding:8px 16px;border-bottom:1px solid var(--line)}
  .modeb{font-size:10px;letter-spacing:.02em;padding:4px 9px;border-radius:6px;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);cursor:pointer}
  .modeb:hover{color:var(--ink)}
  .modeb.on{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
  .mode-hint{font-size:10px;color:var(--ink-faint);margin-left:4px}
  .chat-meta{padding:8px 16px;border-bottom:1px solid var(--line);font-size:11px;color:var(--ink-faint);
    font-family:var(--mono);display:flex;gap:14px;flex-wrap:wrap}
  .sa-tree{padding:8px 16px;border-bottom:1px solid var(--line)}
  .sa-row{display:flex;gap:8px;align-items:center;font-size:11px;padding:3px 0}
  .sa-type{font-family:var(--mono);color:var(--amber)}
  .sa-task{color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sa-meta{margin-left:auto;color:var(--ink-faint);font-family:var(--mono)}

  .fleet-na{text-align:center;color:var(--ink-faint);padding:40px;font-size:13px}

  /* local model chat */
  .lm-wrap{display:flex;flex-direction:column;height:calc(100vh - 140px);min-height:420px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .lm-bar{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
  .lm-bar select{width:auto;min-width:220px}
  .lm-bar .hint{margin:0}
  .lm-msgs{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .lm-foot{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
  .lm-foot textarea{min-height:44px}
  .lm-think{align-self:flex-start;max-width:88%;font-size:11px;color:var(--ink-faint);
    font-style:italic;border-left:2px solid var(--line);padding:2px 0 2px 9px;white-space:pre-wrap}
  /* sparklines in vitals */
  .vital .v{display:flex;align-items:baseline;justify-content:space-between}
  .spark{display:block;width:100%;height:26px;margin:2px 0 6px}
  .spark path{fill:none;stroke:var(--amber);stroke-width:1.6;
    vector-effect:non-scaling-stroke;stroke-linejoin:round}
  .spark .area{fill:var(--amber);opacity:.10;stroke:none}

  /* header extras: theme picker + focus timer */
  .hdr-tools{display:flex;align-items:center;gap:8px;margin-left:auto}
  .host{margin-left:0}
  .icon-btn{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);
    border-radius:8px;padding:6px 9px;font-size:13px;line-height:1;cursor:pointer}
  .icon-btn:hover{color:var(--amber);border-color:var(--amber)}
  .pom{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:5px 9px;font-family:var(--mono);font-size:12px}
  .pom.run{border-color:var(--amber)} .pom.break{border-color:var(--ok)}
  .pom .pom-time{font-variant-numeric:tabular-nums;color:var(--ink);min-width:42px;text-align:center}
  .pom .pom-mini{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:12px;padding:0 2px}
  .pom .pom-mini:hover{color:var(--amber)}
  .theme-menu{position:absolute;right:16px;top:54px;z-index:60;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;padding:10px;display:grid;
    grid-template-columns:repeat(3,1fr);gap:8px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .swatch{cursor:pointer;border:1px solid var(--line);border-radius:9px;padding:8px;width:92px;
    display:flex;flex-direction:column;gap:6px;background:var(--panel-2)}
  .swatch:hover{border-color:var(--amber)} .swatch.sel{border-color:var(--amber);outline:1px solid var(--amber)}
  .swatch .dots{display:flex;gap:4px}
  .swatch .dots i{width:13px;height:13px;border-radius:50%;display:block}
  .swatch .nm{font-size:10px;letter-spacing:.06em;color:var(--ink-dim);text-transform:uppercase}

  /* boost card */
  .boost-modes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .boost-btn{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:13px 14px;
    border:1px solid var(--line);border-radius:11px;background:var(--panel-2);cursor:pointer;text-align:left}
  .boost-btn:hover{border-color:var(--amber)}
  .boost-btn .bg-ico{font-size:22px} .boost-btn .bg-nm{font-weight:600;font-size:13px;color:var(--ink)}
  .boost-btn .bg-sub{font-size:11px;color:var(--ink-faint)}
  .boost-btn.game:hover{border-color:var(--bad);box-shadow:0 0 0 1px var(--bad) inset}
  .boost-btn.energy:hover{border-color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}
  .boost-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--ink-dim)}
  .boost-foot .plan{font-family:var(--mono);color:var(--amber)}
  .boost-foot .gap{margin-left:auto}

  /* power + quick launch grids */
  .power-grid,.launch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px}
  .pbtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel-2);cursor:pointer;color:var(--ink-dim);font-size:11px}
  .pbtn:hover{color:var(--amber);border-color:var(--amber)}
  .pbtn.danger:hover{color:var(--bad);border-color:var(--bad)}
  .pbtn .pico{font-size:19px}
  .tile{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel-2);cursor:pointer;color:var(--ink);font-size:12px;overflow:hidden}
  .tile:hover{border-color:var(--amber);color:var(--amber)}
  .tile .tico{font-size:17px;flex:none} .tile .tnm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* ollama panel */
  .oll-head{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-dim);margin-bottom:10px;flex-wrap:wrap}
  .oll-head .dot2{width:8px;height:8px;border-radius:50%;background:var(--bad);flex:none}
  .oll-head.up .dot2{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .oll-sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:10px 0 5px}
  .oll-row{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;
    padding:5px 0;border-bottom:1px solid var(--panel-2)}
  .oll-row:last-child{border-bottom:none}
  .oll-row .on{color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .oll-row .ov{color:var(--ink-dim);flex:none}
  .oll-row .ub{flex:none;background:none;border:1px solid var(--line);color:var(--ink-faint);
    border-radius:6px;padding:2px 9px;font-size:11px;cursor:pointer}
  .oll-row .ub:hover{border-color:var(--bad);color:var(--bad)}
  .oll-installed{display:flex;flex-wrap:wrap;gap:6px}
  .oll-installed .chip{font-family:var(--mono)}

  /* process explorer */
  .proc-bar{display:flex;gap:8px;margin-bottom:10px}
  .proc-bar input{flex:1;padding:7px 10px}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none}
  .seg button{border:none;border-radius:0;background:var(--panel-2);color:var(--ink-dim);padding:7px 11px;font-size:11px}
  .seg button.on{background:var(--amber-soft);color:var(--amber)}
  .proc-row{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;
    padding:5px 0;border-bottom:1px solid var(--panel-2)}
  .proc-row:last-child{border-bottom:none}
  .proc-row .pn{color:var(--ink-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .proc-row .pv{color:var(--ink);font-variant-numeric:tabular-nums;flex:none;min-width:62px;text-align:right}
  .proc-row .pk{flex:none;background:none;border:1px solid var(--line);color:var(--ink-faint);
    border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer}
  .proc-row .pk:hover{border-color:var(--bad);color:var(--bad)}

  /* notes */
  .notes-area{width:100%;min-height:130px;font-family:var(--mono);font-size:12.5px;line-height:1.5}
  /* drop box (phone → PC file upload) */
  .dropbox h3 .db-dest{font-weight:400;font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-left:8px}
  .db-zone{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;cursor:pointer;
    border:2px dashed var(--line);border-radius:12px;padding:24px 14px;transition:.15s;background:var(--panel-2)}
  .db-zone:hover,.db-zone.drag{border-color:var(--amber);background:var(--amber-soft)}
  .db-zone .db-ico{font-size:30px;line-height:1}
  .db-zone .db-main{font-size:14px;font-weight:600;color:var(--ink)}
  .db-zone .db-sub{font-size:11px;color:var(--ink-faint)}
  .db-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
  .db-row{display:flex;gap:10px;align-items:center;font-size:12px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .db-row .db-fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
  .db-row .db-st{font-size:11px;color:var(--ink-faint);flex:none}
  .db-row .db-st.ok{color:var(--ok)} .db-row .db-st.bad{color:var(--bad)}
  /* away mode / lights */
  .away-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px}
  .away-btn{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 13px;font-weight:600}
  .away-btn small{color:var(--ink-faint);font-size:10px;font-weight:400;line-height:1.3}
  .away-btn:hover{border-color:var(--amber)}
  /* PC file browser */
  .db-browse{margin-left:auto;font-size:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);border-radius:7px;padding:5px 10px}
  .db-browse:hover{color:var(--amber);border-color:var(--amber)}
  .file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .file-chip{font-size:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);border-radius:7px;padding:5px 10px;cursor:pointer}
  .file-chip:hover{color:var(--amber);border-color:var(--amber)}
  .file-row{display:flex;align-items:center;gap:10px;width:100%;text-align:left;text-decoration:none;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 12px;margin-bottom:5px;font-size:13px;cursor:pointer}
  .file-row:hover{border-color:var(--amber)}
  .file-row.up{color:var(--ink-dim)}
  .file-row .f-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-row .f-sz{font-size:11px;color:var(--ink-faint);font-family:var(--mono);flex:none}
  .notes-stat{font-size:10px;color:var(--ink-faint);margin-top:6px;font-family:var(--mono)}

  /* chips (temps / battery) */
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:-4px 0 14px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:4px 11px;font-size:11px;color:var(--ink-dim);font-family:var(--mono)}
  .chip b{color:var(--ink)} .chip.hot b{color:var(--bad)} .chip.warm b{color:var(--warn)}

  /* coder crew */
  .crew-setup{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .crew-setup textarea{min-height:64px;margin-bottom:10px}
  .crew-roles{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end}
  .crew-roles .ctl{display:flex;flex-direction:column;gap:3px}
  .crew-roles label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
  .crew-roles select,.crew-roles input{width:100%}
  .crew-roles .num{width:70px}
  .crew-hint{font-size:11px;color:var(--ink-faint);margin-top:10px}
  .crew-hint b{color:var(--amber)}
  .role-na{color:var(--ink-faint)}
  .crew-run{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .crew-run-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .crew-phase{display:inline-flex;align-items:center;gap:7px;font-size:12px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--ink-dim)}
  .crew-phase .led{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .crew-run[data-status="done"] .led{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .crew-run[data-status="blocked"] .led{background:var(--warn);box-shadow:0 0 6px var(--warn)}
  .crew-run[data-status="error"] .led,.crew-run[data-status="cancelled"] .led{background:var(--bad)}
  .crew-goal{font-size:12px;color:var(--ink-dim);flex:1;min-width:200px}
  .crew-roleschip{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .wkrs{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin:10px 0}
  .wkr{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
  .wkr[data-status="running"]{border-color:var(--amber)}
  .wkr[data-status="done"]{border-color:#3a5a2c}.wkr[data-status="error"]{border-color:var(--bad)}
  .wkr-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .wkr-top .led{width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}
  .wkr[data-status="running"] .led{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .wkr[data-status="done"] .led{background:var(--ok)} .wkr[data-status="error"] .led{background:var(--bad)}
  .wkr-title{font-size:12px;font-weight:600;flex:1}
  .wkr-id{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .wkr-out{font-size:11px;color:var(--ink-dim);max-height:90px;overflow:auto;white-space:pre-wrap;
    border-top:1px solid var(--line);padding-top:6px;margin-top:6px}
  .crew-events{font-family:var(--mono);font-size:11px;max-height:180px;overflow:auto;background:var(--bg);
    border:1px solid var(--line);border-radius:8px;padding:9px;margin-top:6px}
  .ce{padding:2px 0;display:flex;gap:8px} .ce .who{color:var(--ink-faint);flex:none;min-width:58px}
  .ce.tool .what{color:var(--amber)} .ce.err .what{color:var(--bad)} .ce.phase .what{color:var(--ok)}
  .crew-final{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:13px 14px;
    margin-top:10px;font-size:13px;white-space:pre-wrap;line-height:1.5}
  .crew-final h4{margin:0 0 7px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ok)}
  .crew-approve{background:#2a1f16;border:1px solid #5a3a1c;border-radius:10px;padding:12px;margin:10px 0}
  .crew-approve h5{margin:0 0 7px;font-size:12px;color:var(--warn)}
  .crew-approve pre{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px;
    font-size:11px;max-height:120px;overflow:auto;color:var(--ink-dim);margin:0 0 9px}
  /* per-subtask timeline + check line */
  .wkr-badge{margin-left:auto;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
    padding:1px 7px;border-radius:6px;background:var(--amber-soft);color:var(--amber)}
  .wkr[data-status="done"] .wkr-badge{background:#1f3a1c;color:var(--ok)}
  .wkr[data-status="failed"] .wkr-badge,.wkr[data-status="error"] .wkr-badge{background:#3a1c1c;color:var(--bad)}
  .wkr[data-status="unverified"] .wkr-badge{background:#3a2e16;color:var(--warn)}
  .wkr[data-status="unverified"] .led{background:var(--warn)}
  .wkr-check{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin:4px 0 2px;
    word-break:break-word}
  .wkr-check.weak{color:var(--warn)}
  .tl{margin-top:7px;border-left:2px solid var(--line);padding-left:9px;display:flex;flex-direction:column;gap:3px}
  .tl-step{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  .tl-attempt{color:var(--ink);font-weight:600;margin-top:4px}
  .tl-tool{color:var(--ink-faint)}
  .tl-pass{color:var(--ok)} .tl-bad{color:var(--bad)} .tl-warn{color:var(--warn)}
  .tl-dim{color:var(--ink-faint);font-style:italic}
  /* live token chip + swarm node strip */
  .tok-chip{font-family:var(--mono);font-size:10px;color:var(--ink-dim);
    background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:1px 6px;white-space:nowrap}
  .tok-chip b{color:var(--amber);font-weight:600}
  .tok-chip.hot b{color:var(--ok)}
  .wkr-top .tok-chip{margin-left:6px}
  .crew-run-head .tok-chip{margin-left:auto}
  .swarm{display:flex;flex-direction:column;gap:4px;margin:4px 0 10px;
    border-left:2px solid var(--line);padding-left:9px}
  .swarm-head{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}
  .swnode{display:flex;align-items:center;gap:8px;font-size:11px}
  .swnode .led{flex:none}
  .swnode.idle .led{background:var(--ink-faint);box-shadow:none}
  .swnode.live .led{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .swnode .sw-role{font-family:var(--mono);font-size:10px;color:var(--ink-faint);min-width:74px}
  .swnode .sw-act{color:var(--ink-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* ===== research tab: run bar, zoomable graph, node detail, report ===== */
  .rbar{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 12px}
  .rbar .rchip{font-size:11px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);
    cursor:pointer;display:flex;align-items:center;gap:6px;max-width:340px}
  .rbar .rchip.sel{border-color:var(--amber);color:var(--ink)}
  .rbar .rchip .rc-goal{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rbar .rchip .led{flex:none}
  .rbar .rchip[data-status="working"] .led,.rbar .rchip[data-status="planning"] .led,.rbar .rchip[data-status="reviewing"] .led{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .rbar .rchip[data-status="done"] .led{background:var(--ok)}
  .rbar .rchip[data-status="error"] .led{background:var(--bad)}
  .rtoolbar{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .rtoolbar .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .rtoolbar .seg button{background:var(--panel);border:0;color:var(--ink-dim);font-size:11px;padding:5px 12px;cursor:pointer}
  .rtoolbar .seg button.on{background:var(--amber);color:#1a1205;font-weight:600}
  .rtoolbar .sp{flex:1}
  .rtoolbar .tbtn{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink-dim);font-size:11px;padding:5px 10px;cursor:pointer}
  .rtoolbar .tbtn:hover{border-color:var(--amber);color:var(--ink)}
  /* live token HUD — big + obvious */
  .tok-hud{display:flex;align-items:center;gap:30px;padding:12px 20px;margin-bottom:10px;border:1px solid var(--line);
    border-radius:12px;background:linear-gradient(180deg,var(--panel-2),var(--panel))}
  .tok-hud .th-item{display:flex;flex-direction:column;line-height:1.05}
  .tok-hud .th-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--ink);transition:color .3s}
  .tok-hud .th-num.hot{color:var(--amber)}
  .tok-hud .th-num.flash{animation:thflash .55s ease-out}
  @keyframes thflash{0%{color:var(--ok);transform:scale(1.1)}100%{transform:scale(1)}}
  .tok-hud .th-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
  .tok-hud .th-status{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em}
  .rstage{position:relative}
  .rgraph-wrap{position:relative}
  .rgraph-vp{position:relative;overflow:hidden;height:calc(100vh - 196px);min-height:480px;border:1px solid var(--line);border-radius:18px;background:var(--panel);
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:26px 26px;cursor:grab;user-select:none}
  .rgraph-vp.grabbing{cursor:grabbing}
  .rgraph-canvas{position:absolute;top:0;left:0;transform-origin:0 0;transition:transform .18s cubic-bezier(.22,.61,.36,1)}
  .rgraph-canvas.dragging{transition:none}
  .rgraph-edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .rgraph-edges line{stroke:var(--line);stroke-width:1.5;opacity:.55}
  .rgraph-edges line.hot{stroke:var(--amber);stroke-width:2.5;opacity:.95;stroke-dasharray:5 4;animation:flow .6s linear infinite}
  .rgraph-edges path{fill:none;stroke:rgba(255,255,255,.22);stroke-width:1.6;stroke-linecap:round}
  .rgraph-edges path.hot{stroke:var(--amber);stroke-width:2.4;opacity:.95;stroke-dasharray:7 6;animation:flow .7s linear infinite;
    filter:drop-shadow(0 0 4px rgba(224,160,66,.6))}
  @keyframes flow{to{stroke-dashoffset:-13}}
  .rnode{position:absolute;width:174px;box-sizing:border-box;background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:12px;padding:9px 11px;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.28);transition:border-color .12s,box-shadow .12s,transform .12s}
  .rnode:hover{border-color:var(--amber);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .rnode.sel{border-color:var(--amber);box-shadow:0 0 0 2px rgba(255,176,0,.4),0 6px 18px rgba(0,0,0,.4)}
  .rnode.mgr{border-color:var(--amber)}
  .rnode .rn-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .rnode .rn-ico{font-size:13px;line-height:1}
  .rnode .rn-role{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);flex:1}
  .rnode .rn-title{color:var(--ink-dim);font-size:10.5px;line-height:1.3;max-height:28px;overflow:hidden}
  .rnode .rn-tok{font-family:var(--mono);font-size:9.5px;color:var(--amber);margin-top:4px;min-height:11px}
  .rnode .rn-rnd{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.04em;color:var(--amber);
    background:var(--amber-soft);border-radius:5px;padding:1px 5px;margin-left:4px}
  .rnode.live{border-color:var(--ok);animation:nodepulse 1.7s ease-in-out infinite}
  @keyframes nodepulse{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.28)}50%{box-shadow:0 0 0 4px rgba(120,220,120,.16),0 2px 8px rgba(0,0,0,.28)}}
  .rnode.live .led{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .rnode.done .led{background:var(--ok)}
  .rnode.idle .led{background:var(--ink-faint)}
  .rnode.error{border-color:var(--bad)} .rnode.error .led{background:var(--bad);box-shadow:0 0 6px var(--bad)}
  .rgraph-zoom{position:absolute;right:10px;bottom:10px;display:flex;gap:5px;z-index:4}
  .rgraph-zoom button{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink-dim);font-size:15px;cursor:pointer;line-height:1}
  .rgraph-zoom button:hover{border-color:var(--amber);color:var(--ink)}

    --amber-grad:linear-gradient(135deg,#f0b657,#d6892c);
    --ease:cubic-bezier(.22,.61,.36,1);
    --tr:.2s var(--ease);
  }
  /* refined scrollbars */
  *{scrollbar-width:thin;scrollbar-color:#3f372f transparent}
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-thumb{background:#3f372f;border-radius:8px;border:2px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:#574a3c;background-clip:content-box}
  *::-webkit-scrollbar-track{background:transparent}
  /* depth: subtle living glow behind everything (default theme) */
  body{
    background:
      radial-gradient(1150px 580px at 84% -10%, rgba(224,160,66,.13), transparent 60%),
      radial-gradient(820px 520px at -8% 16%, rgba(224,160,66,.07), transparent 55%),
      radial-gradient(700px 700px at 50% 120%, rgba(224,160,66,.05), transparent 60%),
      var(--bg);
    background-attachment:fixed; -webkit-font-smoothing:antialiased;
  }
  /* glassy sticky header */
  header{position:sticky;top:8px;z-index:30;
    backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
    background:linear-gradient(180deg,rgba(28,24,20,.78),rgba(28,24,20,.5));
    border:1px solid var(--line);border-radius:16px;padding:12px 18px;
    box-shadow:var(--sh-2);margin-bottom:20px}
  h1{font-weight:700;letter-spacing:-.015em}
  /* tabs → animated pills */
  .tab{border-radius:11px;font-weight:500;letter-spacing:.01em;
    transition:transform var(--tr),color var(--tr),background var(--tr),box-shadow var(--tr),border-color var(--tr)}
  .tab:hover{transform:translateY(-1px)}
  .tab.active{background:var(--amber-grad);color:#1a1206;border-color:transparent;font-weight:600;
    box-shadow:0 6px 18px -6px var(--amber),inset 0 1px 0 rgba(255,255,255,.25)}
  /* surfaces: depth + hover lift */
  .vital,.card,.gauge,.pool,.project,.scard,.crew-setup,.crew-run,.rdetail,.report-doc,.slides-vp,.tok-hud{
    border-radius:var(--r);box-shadow:var(--sh-1);
    transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr)}
  .vital:hover,.card:hover,.gauge:hover,.project:hover,.scard:hover,.act:hover,.tile:hover{
    transform:translateY(-3px);box-shadow:var(--sh-2);border-color:#4a3f33}
  .vital{position:relative;overflow:hidden}
  .vital::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--amber-grad);
    transform:scaleX(0);transform-origin:left;transition:transform var(--tr)}
  .vital:hover::before{transform:scaleX(1)}
  /* buttons: gradient primary + springy press */
  button{transition:transform .14s var(--ease),border-color var(--tr),color var(--tr),background var(--tr),box-shadow var(--tr),filter var(--tr)}
  button:hover{transform:translateY(-1px)}
  button:active{transform:translateY(0) scale(.97)}
  button.primary{background:var(--amber-grad);color:#1a1206;border-color:transparent;
    box-shadow:0 6px 16px -6px var(--amber),inset 0 1px 0 rgba(255,255,255,.28)}
  button.primary:hover{filter:brightness(1.07);box-shadow:0 10px 24px -6px var(--amber)}
  /* inputs: soft focus ring */
  input,textarea,select{border-radius:10px;transition:border-color var(--tr),box-shadow var(--tr)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
  /* section enter animation */
  #system-view:not(.hidden),#agents-view:not(.hidden),#research-view:not(.hidden),#claude-view:not(.hidden),#assistant-view:not(.hidden){
    animation:viewIn .45s var(--ease)}
  @keyframes viewIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  /* live dot + HUD glow */
  @keyframes softpulse{0%,100%{opacity:1}50%{opacity:.5}}
  h1 .dot.live{animation:softpulse 2s ease-in-out infinite}
  .tok-hud{background:linear-gradient(135deg,var(--panel-2),var(--panel));
    box-shadow:var(--sh-1),inset 0 1px 0 rgba(255,255,255,.05)}
  .tok-hud .th-num.hot{text-shadow:0 0 18px rgba(224,160,66,.5)}
  /* honor reduced-motion for the overhaul too */
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

  /* ======================= LIQUID / MOLTEN GLASS ======================= */
  /* live WebGL molten-metal hero (raw shader, no libs); CSS mesh below is fallback */
  #gl-bg{position:fixed;inset:0;width:100vw;height:100vh;z-index:-1;pointer-events:none;display:block}
  /* a living warm mesh so frosted panels have vivid light to refract */
  body::before{content:"";position:fixed;inset:-25%;z-index:-2;pointer-events:none;
    background:
      radial-gradient(38% 48% at 18% 22%, rgba(245,176,78,.55), transparent 62%),
      radial-gradient(44% 52% at 82% 16%, rgba(220,122,44,.50), transparent 62%),
      radial-gradient(50% 50% at 78% 82%, rgba(150,72,190,.32), transparent 62%),
      radial-gradient(46% 56% at 22% 86%, rgba(54,120,176,.30), transparent 62%);
    filter:blur(48px) saturate(150%);
    animation:meshDrift 26s ease-in-out infinite alternate}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(130% 120% at 50% -10%, transparent 38%, rgba(8,6,4,.6) 100%)}
  @keyframes meshDrift{
    0%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-4%,3%) scale(1.1)}
    100%{transform:translate(4%,-3%) scale(1.06)}}
  body{background:var(--bg)}
  .wrap,#app,#system-view,#agents-view,#research-view,#claude-view,#assistant-view{background:transparent}
  /* frosted glass surfaces */
  .vital,.card,.gauge,.pool,.project,.scard,.crew-setup,.crew-run,.tok-hud,.rdetail,
  .report-doc,.slides-vp,.act,.tile,.bubble,.seg,.saved-row,.scan-find,.hist-run,.crew-approve{
    background:linear-gradient(160deg, rgba(48,41,34,.55), rgba(30,26,22,.40))!important;
    backdrop-filter:blur(24px) saturate(170%);-webkit-backdrop-filter:blur(24px) saturate(170%);
    border:1px solid rgba(255,255,255,.09);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.15), inset 0 -1px 0 rgba(0,0,0,.28), 0 14px 38px -14px rgba(0,0,0,.62)}
  header{background:linear-gradient(160deg,rgba(64,55,44,.52),rgba(36,30,25,.40))!important}
  .rgraph-vp{background:linear-gradient(160deg,rgba(40,34,28,.42),rgba(24,20,17,.34))!important;
    backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);
    border:1px solid rgba(255,255,255,.08);
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px)!important;background-size:26px 26px!important}
  .vital:hover,.card:hover,.gauge:hover,.project:hover,.scard:hover,.act:hover,.tile:hover{
    border-color:rgba(255,255,255,.2)!important;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 20px 48px -14px rgba(0,0,0,.72)!important}
  /* glass nodes in the tree */
  .rnode{background:linear-gradient(160deg,rgba(52,44,36,.66),rgba(32,27,22,.52))!important;
    backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid rgba(255,255,255,.1)!important;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 10px 26px -10px rgba(0,0,0,.6)!important}
  /* kill every native/white scrollbar app-wide */
  html{scrollbar-color:#4a4039 transparent}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:linear-gradient(var(--amber),#9c6a28);border-radius:9px;border:3px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(#f0b657,var(--amber));background-clip:content-box}
  ::-webkit-scrollbar-track,::-webkit-scrollbar-corner{background:transparent}
  /* research stage breaks out of the centered Create column to fill <main>
     (NOT the viewport — must stay right of the sidebar). --main-pad mirrors
     .main's horizontal padding so the bleed reaches main's edges exactly. */
  #research-stage{margin-left:calc(-1*var(--main-pad,30px));margin-right:calc(-1*var(--main-pad,30px));padding:0 22px;scroll-margin-top:10px}
  #research-bar{margin-left:calc(-1*var(--main-pad,30px));margin-right:calc(-1*var(--main-pad,30px));padding:0 22px}
  /* Create tab (merged research + build) */
  .create-head{font-size:12.5px;color:var(--ink-dim);margin-bottom:12px;line-height:1.4}
  .create-head b{color:var(--amber)}
  .create-bar{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
  .create-bar .toggle{margin:0}
  .create-adv{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
  /* List view of agents */
  .ltable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  .ltable th{text-align:left;color:var(--ink-faint);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--line)}
  .ltable td{padding:9px 10px;border-bottom:1px solid var(--line);color:var(--ink-dim);vertical-align:top}
  .lrow{cursor:pointer;transition:background .12s}
  .lrow:hover{background:var(--panel-2)} .lrow.sel{background:var(--amber-soft)}
  .lrow .led{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin-right:5px;background:var(--ink-faint)}
  .lrow.live .led{background:var(--ok);box-shadow:0 0 5px var(--ok)} .lrow.done .led{background:var(--ok)} .lrow.error .led{background:var(--bad)}
  .lrow.live .lc-stat{color:var(--ok)} .lrow.error .lc-stat{color:var(--bad)}
  .lc-role{color:var(--ink);font-family:var(--mono);white-space:nowrap}
  .lc-num{font-family:var(--mono);color:var(--amber);text-align:right;white-space:nowrap}
  .lc-act{color:var(--ink-dim);max-width:420px}
  .ldetail{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:14px;background:var(--panel)}
  .ldetail .ld-h{font-size:13px;color:var(--ink);margin-bottom:8px}
  .ldetail .ld-body{font-size:12.5px;color:var(--ink-dim);line-height:1.5;white-space:pre-wrap;max-height:320px;overflow:auto}

  /* ================== MATTE / CLAUDE-STYLE (calm, flat, centered) ================== */
  /* kill the rendered shader + mesh + theme bg-fx → flat matte screen */
  #gl-bg{display:none!important}
  #bg-fx{display:none!important;opacity:0!important}
  body::before,body::after{display:none!important}
  body.fx-glass :is(.card,.vital,.gauge,.pool,.project,.crew-setup,.crew-run,.modal,.scard,.bubble,.chip,.tile,.seg,.pom,.icon-btn,.theme-menu){
    backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
  body{background:var(--bg)!important}
  /* flat matte surfaces: solid panel, hairline border, no blur/gloss/gradient */
  .vital,.card,.gauge,.pool,.project,.scard,.crew-setup,.crew-run,.tok-hud,.rdetail,.report-doc,
  .slides-vp,.act,.tile,.bubble,.seg,.saved-row,.scan-find,.hist-run,.crew-approve,.rnode,.modal,.lm-shell{
    background:var(--panel)!important; backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
    border:1px solid var(--line)!important; box-shadow:none!important; background-image:none!important}
  .tok-hud{background:var(--panel-2)!important}
  /* header: flat matte bar */
  header{background:var(--panel)!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
    border:1px solid var(--line)!important;box-shadow:none!important}
  /* tabs + buttons: flat (no gradient/glow) */
  .tab{transform:none!important}
  .tab.active{background:var(--amber-soft)!important;color:var(--amber)!important;box-shadow:none!important;border-color:#4a3a1c!important}
  button.primary{background:var(--amber)!important;box-shadow:none!important;background-image:none!important}
  button:hover,button.primary:hover{transform:none!important;filter:none!important;box-shadow:none!important}
  /* calm hover: just a border tint, no lift/glow/specular */
  .vital:hover,.card:hover,.gauge:hover,.project:hover,.scard:hover,.act:hover,.tile:hover,.rnode:hover{
    transform:none!important;box-shadow:none!important;border-color:#4a3f33!important}
  .vital::before{display:none!important}
  .rnode.live{animation:none!important;border-color:var(--ok)!important}
  /* tree viewport: flat matte canvas */
  .rgraph-vp{background:var(--panel)!important;backdrop-filter:none!important;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px)!important;background-size:26px 26px!important;
    border:1px solid var(--line)!important}
  .rgraph-edges path{stroke:rgba(255,255,255,.16)!important;filter:none!important}
  .rgraph-edges path.hot{stroke:var(--amber)!important;filter:none!important}
  /* a touch more calm: lighter focus rings, no flash scale */
  .tok-hud .th-num.hot{text-shadow:none!important}
  .tok-hud .th-num.flash{animation:none!important}

  /* ================== PRIVATE — ephemeral local chat ================== */
  .pv-shell{display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;
    min-height:calc(100vh - 200px)}
  .pv-head{text-align:center;padding:6px 0 2px}
  .pv-htop{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
  .pv-title{font-size:22px;font-weight:600;letter-spacing:.02em;color:var(--ink)}
  .pv-model{font-family:var(--mono);font-size:12px;background:var(--panel);color:var(--ink-dim);
    border:1px solid var(--line);border-radius:8px;padding:6px 10px;max-width:240px}
  .pv-note{margin-top:7px;font-size:12px;color:var(--ink-faint);letter-spacing:.01em}
  .pv-thread{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:8px 2px}
  .pv-empty{margin:auto;text-align:center;color:var(--ink-faint);font-size:14px;line-height:1.7}
  .pv-empty .pv-lock{font-size:40px;opacity:.5;margin-bottom:10px}
  .pv-empty span{font-size:12px;color:var(--ink-faint)}
  .pv-msg{display:flex}
  .pv-msg.user{justify-content:flex-end}
  .pv-msg.assistant{justify-content:flex-start}
  .pv-b{max-width:80%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5;
    white-space:pre-wrap;word-break:break-word;border:1px solid var(--line)}
  .pv-msg.user .pv-b{background:var(--amber-soft);border-color:#4a3a1c;color:var(--ink);border-bottom-right-radius:5px}
  .pv-msg.assistant .pv-b{background:var(--panel);color:var(--ink);border-bottom-left-radius:5px}
  .pv-think{color:var(--ink-faint);letter-spacing:.18em}
  .pv-bar{display:flex;align-items:flex-end;gap:8px;padding:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;position:sticky;bottom:8px}
  .pv-input{flex:1;resize:none;max-height:160px;background:transparent;border:none;outline:none;
    color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;padding:6px 4px}
  .pv-send,.pv-wipe{flex:none;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);
    cursor:pointer;font-size:16px;transition:.15s;background:var(--panel-2);color:var(--ink-dim)}
  .pv-send{background:var(--amber);color:#1a130a;border-color:var(--amber)}
  .pv-send:hover{filter:brightness(1.08)}
  .pv-wipe:hover{border-color:var(--bad);color:var(--bad)}
  .pv-stat{text-align:center;font-size:12px;color:var(--ink-faint);min-height:14px}
  @media(max-width:560px){ .pv-shell{min-height:calc(100vh - 150px)} .pv-b{max-width:88%} }

  /* VPN card */
  .vpn-status{font-size:14px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .vpn-dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint);display:inline-block;flex:none}
  .vpn-dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .vpn-ip{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
  .vpn-off{border-color:var(--line)}
  .vpn-off:hover{border-color:var(--bad)!important;color:var(--bad)!important}
  .vpn-bar{display:flex;gap:8px;align-items:center}
  .vpn-search{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--sans);font-size:14px;padding:9px 12px;outline:none}
  .vpn-search:focus{border-color:var(--amber)}
  .vpn-list{margin-top:10px;max-height:300px;overflow-y:auto;border:1px solid var(--line);
    border-radius:10px;background:var(--panel-2)}

    border-bottom:1px solid var(--line);transition:background .12s}
  .vpn-row:last-child{border-bottom:none}
  .vpn-row:hover{background:var(--amber-soft)}
  .vpn-row.on{background:var(--amber-soft)}
  .vpn-flag{font-size:18px;flex:none;width:24px;text-align:center}
  .vpn-co{font-weight:600;font-size:13px;color:var(--ink);min-width:0}

  /* ============ UNIFIED CALM LAYOUT (Private/Claude-homepage feel) ============
     Centered narrow columns + generous breathing room across every section, so
     the whole panel reads like the Private chat: minimal, modern, uncluttered.
     The research tree stage is intentionally left full-bleed. */
  #system-view{max-width:1080px;margin:0 auto}
  .create-setup,#research-saved,#research-bar{max-width:880px;margin-left:auto;margin-right:auto}
  .create-head{text-align:center;font-size:15px;color:var(--ink);margin-bottom:4px}
  .create-setup{padding:18px 18px 16px}
  header{border-radius:0 0 14px 14px}
  /* fold-away Power tools (the old Tools tab) — collapsed, quiet, one click to full power */
  .power-tools{max-width:880px;margin:20px auto 0;border:1px solid var(--line);
    border-radius:13px;background:var(--panel);overflow:hidden}
  .power-tools>summary{list-style:none;cursor:pointer;padding:14px 18px;font-size:13px;
    font-weight:600;color:var(--ink-dim);user-select:none;letter-spacing:.01em}
  .power-tools>summary::-webkit-details-marker{display:none}
  .power-tools>summary::before{content:"▸";margin-right:9px;color:var(--ink-faint)}
  .power-tools[open]>summary{border-bottom:1px solid var(--line)}
  .power-tools[open]>summary::before{content:"▾"}
  .power-tools>summary:hover{color:var(--ink)}
  .power-tools #crew-host{padding:14px 16px 16px;display:flex;flex-direction:column;gap:14px}
  /* the relocated crew cards already have their own top margins; tidy doubled gaps */
  .power-tools #crew-host>*{margin-top:0}

  /* ===================== CLAUDE-APP SHELL (left sidebar) ===================== */
  .appshell{display:flex;min-height:100vh}
  .sidebar{width:250px;flex:none;background:var(--sidebar);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 12px;gap:3px;position:sticky;top:0;height:100vh}
  .sb-brand{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;
    letter-spacing:.01em;color:var(--ink);padding:6px 10px 14px}
  .sb-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);transition:.3s;flex:none}
  .sb-brand .dot.live{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .sb-new{display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;
    font-family:var(--sans);font-size:14px;font-weight:500;padding:9px 11px;margin-bottom:8px;transition:.12s}
  .sb-new .sb-ico{font-size:14px;width:18px;text-align:center;flex:none;color:var(--amber)}
  .sb-new:hover{border-color:var(--amber);background:var(--panel-2)}
  .sb-nav{display:flex;flex-direction:column;gap:2px}
  .sb-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;
    border:none;background:transparent;color:var(--ink-dim);border-radius:9px;
    font-family:var(--sans);font-size:14px;font-weight:500;padding:9px 11px;transition:.12s}
  .sb-item .sb-ico{font-size:15px;width:18px;text-align:center;flex:none}
  .sb-item:hover{background:var(--panel);color:var(--ink)}
  .sb-item.active{background:var(--panel-2);color:var(--ink)}
  .sb-spacer{flex:1}
  .sb-foot{display:flex;flex-direction:column;gap:9px;padding:11px 6px 2px;border-top:1px solid var(--line)}
  .sb-foot-row{display:flex;align-items:center;gap:8px}
  .sb-foot .host{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin:0;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-foot .pom{margin:0}
  /* audit log card */
  .audit-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px}
  .audit-row:last-child{border-bottom:none}
  .ar-act{font-family:var(--mono);color:var(--ink);min-width:120px}
  .ar-d{font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:1px 7px;border-radius:6px;flex:none}
  .ar-d.d-caution{background:var(--amber-soft);color:var(--amber)}
  .ar-d.d-destructive{background:rgba(207,94,78,.18);color:var(--bad)}

/* ============================ shared helpers ============================ */
const $ = (sel,el=document)=>el.querySelector(sel);

const H = (extra)=>({ "Authorization":"Bearer "+token(), ...(extra||{}) });
const api = (path,opts={})=>fetch(path,{...opts,headers:H({"Content-Type":"application/json",...(opts.headers||{})})});
const getJSON = async (path)=>{ const r=await fetch(path,{headers:H()}); if(!r.ok) throw new Error(r.status); return r.json(); };
const post = async (path,body)=>{ const r=await api(path,{method:"POST",body:body?JSON.stringify(body):undefined});
  if(!r.ok){ const e=await r.json().catch(()=>({})); alert(`${path}: ${e.detail||r.status}`); throw new Error(r.status);} return r.json(); };
const del = async (path)=>{ const r=await api(path,{method:"DELETE"}); if(!r.ok) throw new Error(r.status); return r.json(); };
// lightweight transient toast — feedback that works on any tab
function toast(msg, kind){
  let host=document.getElementById("toast-host");
  if(!host){ host=document.createElement("div"); host.id="toast-host"; document.body.appendChild(host); }
  const t=document.createElement("div"); t.className="toast "+(kind||""); t.textContent=msg;
  host.appendChild(t); requestAnimationFrame(()=>t.classList.add("show"));
  setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),260); }, 2600);
}

function esc(s){ return String(s ?? "").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function fmtDuration(s){ if(s==null) return ""; s=Math.floor(s);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  return h?`${h}h${String(m).padStart(2,"0")}m`:m?`${m}m${String(s%60).padStart(2,"0")}s`:`${s}s`; }
function fmtTokens(n){ n=n||0; if(n>=1e6) return `${(n/1e6).toFixed(n>=1e7?0:1)}M`;
  return n>=1000?`${(n/1000).toFixed(n>=100000?0:1)}k`:String(n); }
function pctClass(p){ return p>=90?"bad":p>=70?"warn":"ok"; }

/* =============================== themes =============================== */
/* Each theme overrides CSS custom properties on :root. "amber" = the built-in

  nord:   { name:"Nord", peek:{bg:"#2e3440",hi:"#88c0d0",ok:"#a3be8c"}, vars:{

    "--ink":"#eceff4","--ink-dim":"#b6becb","--ink-faint":"#7b8394",
    "--amber":"#88c0d0","--amber-soft":"#3b4a52","--ok":"#a3be8c","--warn":"#ebcb8b","--bad":"#bf616a" }},

};
function currentTheme(){ return localStorage.getItem("pcp_theme") || "graphite"; }
function applyTheme(key){
  const t = THEMES[key] || THEMES.graphite, root = document.documentElement;
  Object.values(THEMES).forEach(th=>Object.keys(th.vars).forEach(v=>root.style.removeProperty(v)));
  Object.entries(t.vars).forEach(([k,v])=>root.style.setProperty(k,v));
  document.body.dataset.theme = key;
  document.body.classList.remove("fx-glass");   // flat matte everywhere
  localStorage.setItem("pcp_theme", key);
}
function setTheme(key){ applyTheme(key); renderThemeSwatches(); }
function renderThemeSwatches(){
  const el=document.getElementById("sb-themes"); if(!el) return;
  const cur=currentTheme();
  el.innerHTML = Object.entries(THEMES).map(([k,t])=>
    `<button class="sw ${k===cur?"sel":""}" title="${esc(t.name)}" onclick="setTheme('${k}')"
       style="background:${t.peek.bg}"><i style="background:${t.peek.hi}"></i></button>`).join("");
}

/* ============================= focus timer ============================ */
const POM_FOCUS=25*60, POM_BREAK=5*60;
let pom = { mode:"focus", left:POM_FOCUS, running:false, timer:null };
function pomRender(){
  const el=document.getElementById("pom"); if(!el) return;
  const m=Math.floor(pom.left/60), s=pom.left%60;
  el.className="pom"+(pom.running?(pom.mode==="break"?" break":" run"):"");
  el.innerHTML=`<span title="Focus timer">${pom.mode==="break"?"☕":"🍅"}</span>
    <span class="pom-time">${m}:${String(s).padStart(2,"0")}</span>
    <button class="pom-mini" id="pom-toggle">${pom.running?"⏸":"▶"}</button>
    <button class="pom-mini" id="pom-reset">↺</button>`;
  el.querySelector("#pom-toggle").onclick=pomToggle;
  el.querySelector("#pom-reset").onclick=pomReset;
}
function pomTick(){
  if(pom.left>0){ pom.left--; pomRender(); return; }
  pom.mode = pom.mode==="focus"?"break":"focus";
  pom.left = pom.mode==="break"?POM_BREAK:POM_FOCUS;
  try{ new Notification(pom.mode==="break"?"Focus done — take a break ☕":"Break over — back to it 🍅"); }catch{}
  pomRender();
}
function pomToggle(){
  pom.running=!pom.running;
  if(pom.running){
    if("Notification"in window && Notification.permission==="default") Notification.requestPermission();
    pom.timer=setInterval(pomTick,1000);
  } else clearInterval(pom.timer);
  pomRender();
}
function pomReset(){ clearInterval(pom.timer); pom.running=false; pom.mode="focus"; pom.left=POM_FOCUS; pomRender(); }

function setMNav(key){

function switchSection(name){
  // leaving the assistant while in 🔒 Private mode wipes the ephemeral chat AND
  // unloads the local model so nothing lingers in RAM or VRAM.
  if(section==="assistant" && name!=="assistant" && lm.incognito) privLeave();
  section = name;
  try{ history.replaceState(null,"","#"+name); }catch{}   // deep-link + enables headless section shots
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active", b.dataset.sec===name));
  setMNav(name);
  $("#system-view").classList.toggle("hidden", name!=="system");
  $("#research-view")?.classList.toggle("hidden", name!=="research");
  $("#swarm-view")?.classList.toggle("hidden", name!=="swarm");
  $("#claude-view")?.classList.toggle("hidden", name!=="claude");
  $("#assistant-view")?.classList.toggle("hidden", name!=="assistant");
  document.body.classList.toggle("asst-open", name==="assistant");  // mobile: full-screen + lock scroll
  if(ticker) clearInterval(ticker);
  if(name==="system"){ pollGpu(); tickSystem(); tickProcs(); pollOllama(); pollAudit(); ticker=setInterval(()=>{pollGpu();tickSystem();tickProcs();pollOllama();},3000); }

  else if(name==="assistant"){ lmRefresh(); if(!crew.config) crewRefreshConfig(); }
}

async function vpnInit(){
  if(!$("#vpn-list")) return;
  let d; try{ d=await getJSON("/api/vpn/configs"); }catch{ return; }
  if(!d.installed){ $("#vpn-status").innerHTML="WireGuard not installed."; $("#vpn-list").innerHTML=""; return; }
  vpnConfigs=(d.configs||[]).map(c=>({name:c.name,cc:c.cc,city:c.city,
    country:vpnCountry(c.cc),cityName:vpnCityName(c.city),flag:vpnFlag(c.cc)}))
    .sort((a,b)=>a.country.localeCompare(b.country)||a.cityName.localeCompare(b.cityName));
  const sub=$("#vpn-sub"); if(sub) sub.textContent=`— WireGuard · ${vpnConfigs.length} locations · no app, no telemetry`;
  vpnRenderList(""); vpnRefresh();
}
function vpnRenderList(q){
  const el=$("#vpn-list"); if(!el) return;
  q=(q||"").trim().toLowerCase();
  const rows=vpnConfigs.filter(c=>!q||c.country.toLowerCase().includes(q)||c.cityName.toLowerCase().includes(q)||c.cc.includes(q)||c.city.includes(q));
  if(!rows.length){ el.innerHTML=`<div class="vpn-empty">No match for “${esc(q)}”.</div>`; return; }
  el.innerHTML=rows.map(c=>`<div class="vpn-row ${c.name===vpnActive?"on":""}" onclick="vpnConnect('${esc(c.name)}')">
    <span class="vpn-flag">${c.flag}</span>
    <span class="vpn-co">${esc(c.country)}</span>
    <span class="vpn-city">${esc(c.cityName)}</span>
    ${c.name===vpnActive?'<span class="vpn-chk">✓ connected</span>':'<span class="vpn-conn">Connect</span>'}
  </div>`).join("");
}
function vpnFilter(){ vpnRenderList($("#vpn-search")?.value||""); }
async function vpnRefresh(){
  const el=$("#vpn-status"); if(!el) return;
  let s; try{ s=await getJSON("/api/vpn/status"); }catch{ el.innerHTML="status unavailable"; return; }
  vpnActive = s.connected ? s.tunnel : null;
  if(s.connected){
    const c=vpnConfigs.find(x=>x.name===s.tunnel);
    const lbl = c?`${c.flag} ${c.country} · ${c.cityName}`:(s.location||s.tunnel||"");

function initDropbox(){
  const dest=$("#db-dest"); if(dest) dest.textContent = sysConfig.upload_dir ? "→ "+sysConfig.upload_dir : "";
  const zone=$("#db-zone"); if(!zone) return;
  ["dragenter","dragover"].forEach(ev=>zone.addEventListener(ev,e=>{ e.preventDefault(); zone.classList.add("drag"); }));

async function uploadFiles(fileList){
  const files=[...(fileList||[])]; if(!files.length) return;
  const list=$("#db-list");
  for(const f of files){
    const row=document.createElement("div"); row.className="db-row";
    row.innerHTML=`<span class="db-fn">${esc(f.name)}</span><span class="db-st">uploading…</span>`;
    list&&list.prepend(row);
    const st=row.querySelector(".db-st");
    try{
      const r=await fetch("/api/upload?filename="+encodeURIComponent(f.name),
        { method:"POST", headers:{...H(),"Content-Type":"application/octet-stream"}, body:f });
      if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||("HTTP "+r.status)); }
      await r.json(); st.textContent="✓ saved"; st.classList.add("ok"); toast("📥 "+f.name+" → PC","ok");
    }catch(e){ st.textContent="✕ "+(e.message||"failed"); st.classList.add("bad"); toast("✕ "+f.name+" failed","bad"); }
  }
  const inp=$("#db-input"); if(inp) inp.value="";
}

function sparkline(series, max){
  if(!series || series.length<2) return "";
  const w=100, h=26, n=series.length;
  const mx = max || Math.max(1, ...series);
  const pts = series.map((v,i)=>[ (i/(n-1))*w, h - (Math.min(v,mx)/mx)*(h-3) - 1.5 ]);
  const line = pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const area = `M0 ${h} ${pts.map(p=>"L"+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ")} L${w} ${h} Z`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="area" d="${area}"/><path d="${line}"/></svg>`;
}
function vital(k,v,unit,pct,sub,spark){
  const col = pct==null?"var(--amber)":`var(--${pctClass(pct)})`;
  const mid = spark!=null ? spark
    : `<div class="bar"><span style="width:${pct??0}%;background:${col}"></span></div>`;
  return `<div class="vital"><div class="k">${k}</div>
    <div class="v">${v}<small>${unit||""}</small></div>
    ${mid}<div class="sub">${sub||""}</div></div>`;
}

let gpuState = null;
async function pollGpu(){
  if(section!=="system") return;
  try{ gpuState = await getJSON("/api/gpu"); }catch{ gpuState = null; }
}
function gpuVital(){
  const g = gpuState;
  if(!g) return vital("GPU","…","",null,"reading…");
  if(!g.available) return vital("GPU","–","",null, esc(g.reason || "GPU telemetry not configured"));
  const sub=[];
  if(g.vram_used_gb!=null && g.vram_total_gb!=null) sub.push(`${g.vram_used_gb}/${g.vram_total_gb} GB`);
  if(g.util_percent!=null) sub.push(`util ${g.util_percent}%`);
  if(g.temp_c!=null) sub.push(`${g.temp_c}°C`);
  if(g.fan_percent!=null) sub.push(`fan ${g.fan_percent}%`);
  if(g.clock_mhz!=null) sub.push(`${g.clock_mhz} MHz`);
  // Headline = VRAM (what tells you a model is loaded); fall back to %/util.
  const head = g.vram_used_gb!=null ? g.vram_used_gb : (g.vram_percent!=null ? g.vram_percent : "●");
  const unit = g.vram_used_gb!=null ? "GB" : (g.vram_percent!=null ? "%" : "");
  return vital("GPU VRAM", head, unit, g.vram_percent!=null ? g.vram_percent : null, esc(sub.join(" · ")));
}
function ollamaVital(){
  const o=ollamaState;
  if(!o) return vital("Ollama VRAM","…","",null,"checking…");
  if(!o.available) return vital("Ollama VRAM","–","",null,"offline");
  const gb = o.vram_bytes!=null ? (o.vram_bytes/1073741824) : 0;
  const n = o.resident_count||0;
  return vital("Ollama VRAM", gb.toFixed(1), "GB", null, `${n} model${n===1?"":"s"} resident`);
}
async function tickSystem(){
  let s;

  $("#dot").classList.add("live");
  $("#host").textContent = location.host + " · up " + s.uptime.human;
  const downBytes = s.network.down_per_sec.bytes;
  pushHist(history.cpu, s.cpu.percent);
  pushHist(history.mem, s.memory.percent);
  pushHist(history.net, downBytes);
  $("#vitals").innerHTML =
    vital("CPU", s.cpu.percent.toFixed(0), "%", s.cpu.percent, `${s.cpu.physical} cores · ${s.cpu.freq_mhz||"?"} MHz`, sparkline(history.cpu,100)) +
    vital("Memory", s.memory.percent.toFixed(0), "%", s.memory.percent, `${s.memory.used.human} / ${s.memory.total.human}`, sparkline(history.mem,100)) +
    vital("Net ↓", s.network.down_per_sec.human.split(" ")[0], s.network.down_per_sec.human.split(" ")[1]+"/s", null, `↑ ${s.network.up_per_sec.human}/s`, sparkline(history.net)) +
    gpuVital() +
    ollamaVital() +
    vital("Tokens ⚡", fmtTokens(s.tokens_all_time||0), "", null, "all-time Claude tokens", "");
  renderChips(s);
  $("#disks").innerHTML = s.disks.map(d=>`
    <div class="row"><span class="name">${d.device||d.mount}</span>
      <span class="num" style="color:var(--${pctClass(d.percent)})">${d.percent}% · ${d.free.human} free</span></div>`).join("") || "<div class='hint'>No disks.</div>";
}
function renderChips(s){
  const el=$("#chips"); if(!el) return;
  const chips=[];
  if(s.battery && s.battery.available){
    const p=s.battery.percent, cls=p<=15?"hot":p<=30?"warm":"";
    chips.push(`<span class="chip ${cls}">${s.battery.plugged?"🔌":"🔋"} <b>${p}%</b>${s.battery.remaining?` · ${s.battery.remaining} left`:""}</span>`);
  }
  if(s.temps && s.temps.available){
    s.temps.sensors.slice(0,4).forEach(t=>{
      if(t.current==null) return;
      const cls=t.current>=85?"hot":t.current>=70?"warm":"";
      chips.push(`<span class="chip ${cls}">🌡 ${esc(t.label)} <b>${t.current}°</b></span>`);
    });
  }
  chips.push(`<span class="chip">🧮 swap <b>${s.memory.swap_percent}%</b></span>`);
  el.innerHTML = chips.join("");
}
