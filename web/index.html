let ollamaState = null;
function fmtExpiry(iso){
  if(!iso) return ""; const t=new Date(iso).getTime(); if(isNaN(t)) return "";
  const s=Math.round((t-Date.now())/1000);
  return s<=0 ? "expiring" : "expires "+fmtDuration(s);
}
async function pollOllama(){
  if(section!=="system") return;
  try{ ollamaState = await getJSON("/api/ollama"); }catch{ ollamaState={available:false}; }
  renderOllama();
}
function renderOllama(){
  const el=$("#ollama"); if(!el) return; const o=ollamaState;
  if(!o){ el.innerHTML=`<div class="hint">checking…</div>`; return; }
  if(!o.available){
    el.innerHTML=`<div class="oll-head"><span class="dot2"></span>Ollama offline · <a href="#" onclick="lmStart();return false">start it</a></div>`;
    return;
  }
  const resident=(o.resident||[]).map(m=>`<div class="oll-row">
      <span class="on" title="${esc(m.name)}">${esc(m.name)}</span>
      <span class="ov">${esc(m.size_vram_human||"")}${m.expires_at?` · ${esc(fmtExpiry(m.expires_at))}`:""}</span>
      <button class="ub" onclick="ollamaUnload('${esc(m.name).replace(/'/g,"")}')">Unload</button></div>`).join("")
    || `<div class="hint">No models resident in VRAM.</div>`;
  const installed=(o.installed||[]).map(m=>
      `<span class="chip">${esc(m.name)}${m.param_size?` · ${esc(m.param_size)}`:""}</span>`).join("")
    || `<div class="hint">No models installed.</div>`;
  el.innerHTML=`
    <div class="oll-head up"><span class="dot2"></span>
      <b>${o.resident_count} resident</b> · ${esc(o.vram_human||"0 B")} in VRAM
      · <span style="color:var(--ink-faint)">${esc(o.host||"")}</span></div>
    <div class="oll-sub">Resident (loaded in VRAM)</div>${resident}
    <div class="oll-sub">Installed</div><div class="oll-installed">${installed}</div>`;
}
async function ollamaUnload(name){
  if(!confirm(`Unload "${name}" and free its VRAM? It reloads on next use.`)) return;
  await invoke("unload_model",{model:name}); pollOllama();
}

/* process explorer */
let procView = { by:"mem", q:"" };
let procTimer = null;
function setProcSort(by){
  procView.by=by;
  $("#proc-mem").classList.toggle("on", by==="mem");
  $("#proc-cpu").classList.toggle("on", by==="cpu");
  tickProcs();
}
function onProcQuery(){
  procView.q = $("#proc-q").value.trim();
  clearTimeout(procTimer); procTimer=setTimeout(tickProcs, 250);
}
async function tickProcs(){
  if(section!=="system" || !$("#proc-list")) return;
  let j;
  try{ j = await getJSON(`/api/processes?by=${procView.by}&limit=18${procView.q?`&q=${encodeURIComponent(procView.q)}`:""}`); }
  catch{ return; }
  $("#proc-list").innerHTML = j.processes.map(p=>{
    const val = procView.by==="cpu" ? `${p.cpu.toFixed(1)}%` : p.mem.human;
    return `<div class="proc-row"><span class="pn" title="PID ${p.pid}">${esc(p.name)}</span>
      <span class="pv">${val}</span>
      <button class="pk" onclick="killProc(${p.pid},'${esc(p.name).replace(/'/g,"")}')">✕</button></div>`;
  }).join("") || `<div class="hint">No matching processes.</div>`;
}
async function killProc(pid,name){
  if(!confirm(`Stop "${name}" (PID ${pid})?`)) return;
  await invoke("kill_process",{pid}); tickProcs();
}

/* notes — autosave (debounced) */
let notesTimer=null, notesLoaded=false;
async function loadNotes(){
  try{ const j = await getJSON("/api/notes");
    const ta=$("#notes"); if(ta){ ta.value=j.text||""; ta.oninput=onNotesInput; notesLoaded=true; updateNotesStat("saved"); }
  }catch{ updateNotesStat("offline"); }
}
function updateNotesStat(state){
  const el=$("#notes-stat"); if(!el) return;
  const n=($("#notes")?.value||"").length;
  el.textContent = (state==="saving"?"saving…":state==="offline"?"couldn't reach server":"saved ✓")+` · ${n} chars`;
}
function onNotesInput(){
  if(!notesLoaded) return;
  updateNotesStat("saving");
  clearTimeout(notesTimer); notesTimer=setTimeout(saveNotes, 700);
}
async function saveNotes(){
  try{ await post("/api/notes",{text:$("#notes").value}); updateNotesStat("saved"); }
  catch{ updateNotesStat("offline"); }
}

async function loadActions(){
  try{
    const j = await getJSON("/api/actions"); actionSpecs = j.actions;
    $("#sysactions").innerHTML = actionSpecs.filter(a=>!DEDICATED.has(a.name)).map(a=>{
      const adm = a.needs_admin ? "<span class='badge'>admin</span>":"";
      const dz = a.danger==="destructive"?"destructive":"";
      return `<button class="act ${dz}" data-name="${a.name}" title="${a.description}">${a.label}${adm}</button>`;
    }).join("");
    $("#sysactions").querySelectorAll("button").forEach(b=>{ b.onclick=()=>runAction(b.dataset.name); });
  }catch{ slog("Couldn't load actions.", false); }
}
async function runAction(name){
  const spec = actionSpecs.find(a=>a.name===name); const params={};
  for(const [p,meta] of Object.entries(spec.params||{})){
    if(p==="dry_run") continue;
    const val = prompt(`${spec.label} — enter ${p}`+(meta.choices?` (${meta.choices.join("/")})`:""));
    if(val===null) return; params[p]=val;
  }
  if(spec.danger==="destructive"){
    if(name==="clean_temp"){ const prev=await invoke(name,{dry_run:true}); if(!prev) return;
      if(!confirm(`${prev.message}.\n\nDelete them now?`)) return; params.dry_run=false; }
    else if(!confirm(`Run "${spec.label}"? This can't be undone.`)) return;
  }
  await invoke(name, params);
}
async function invoke(name, params){
  try{
    const r = await api("/api/run",{method:"POST",body:JSON.stringify({name,params})});
    const j = await r.json();
    if(!r.ok){ slog(`${name}: ${j.detail||"error"}`, false); return null; }
    slog(j.message || JSON.stringify(j), j.ok!==false);
    if(j.entries) j.entries.forEach(e=>slog(`  ${e.name} — ${e.command||e.location}`, true));
    if(j.ports) j.ports.forEach(p=>slog(`  :${p.port}  ${p.process} (pid ${p.pid})`, true));
    return j;
  }catch(e){ slog(`${name}: ${e}`, false); return null; }
}
function slog(msg, ok){
  const el=$("#log"); if(!el) return;
  const div=document.createElement("div"); div.className="line";
  div.innerHTML=`<span class="t">${new Date().toLocaleTimeString()}</span><span class="m ${ok?'ok':'bad'}">${msg.replace(/</g,"&lt;")}</span>`;
  el.prepend(div);
}

/* =============================== FLEET ================================= */
let fleet = { projects:[], sessions:[], totals:{}, pool:{}, now:0 };
const answersInProgress = {};   // {sid:{question:label}}
let chat = { sid:null, data:{messages:[],model_usage:[],subagents:[]}, renderedCount:-1 };

function buildFleet(){
  // Folded into the Agents section. When the SDK isn't present there are no
  // Claude Code sessions, so render nothing at all.
  const host = $("#fleet-host");
  if(!host) return;
  if(!fleetAvailable){ host.innerHTML = ""; return; }
  host.innerHTML = `
    <div class="agents-sub">
      <div class="agents-sub-head">
        <span>Claude Code sessions</span>
        <button style="margin-left:auto" onclick="openHistory()">🗂 Logs</button>
        <button class="primary" onclick="openNewProject()">+ New Project</button>
      </div>
      <div id="fl-instruments" class="instruments hidden"></div>
      <div id="fl-inbox"></div>
      <div id="fl-projects"></div>
    </div>`;
}
async function pollFleet(){
  if(section!=="claude") return;
  try{ fleet = await getJSON("/fleet/api/state"); }catch{ return; }
  $("#dot")?.classList.add("live");
  renderInstruments(); renderInbox(); renderProjects();
  if(chat.sid){
    try{ chat.data = await getJSON(`/fleet/api/sessions/${chat.sid}/messages`); renderChatBody(); }catch{}
  }

function renderInstruments(){
  const el=$("#fl-instruments"); if(!el) return;
  // The instrument rail is noise when nothing's running — only show it when
  // there is at least one live Claude Code session.
  const hasSessions = (fleet.sessions||[]).length > 0;
  el.classList.toggle("hidden", !hasSessions);
  if(!hasSessions){ el.innerHTML=""; return; }
  const t=fleet.totals||{};
  const totalTokens=(fleet.sessions||[]).reduce((a,s)=>a+(s.cumulative_tokens||0),0);
  el.innerHTML =
    `<div class="gauge"><span class="g-label">running</span><span class="g-val">${t.running||0}</span></div>
     <div class="gauge ${t.blocked?"alarm":""}"><span class="g-label">blocked</span><span class="g-val">${t.blocked||0}</span></div>
     <div class="gauge"><span class="g-label">idle</span><span class="g-val">${t.idle||0}</span></div>
     <div class="gauge"><span class="g-label">tokens used</span><span class="g-val">${fmtTokens(totalTokens)}</span></div>`;
}
function renderInbox(){
  const blocked = (fleet.sessions||[]).filter(s=>s.pending);
  const el=$("#fl-inbox");
  if(!blocked.length){ el.innerHTML=""; return; }
  el.innerHTML = `<div class="inbox"><h4>⚠ ${blocked.length} session${blocked.length>1?"s":""} awaiting you</h4>
    ${blocked.map(s=>{ const isQ=s.pending.tool_name==="AskUserQuestion";
      return `<div class="inbox-item">
        <span class="ii-proj">${esc(s.project_name)}</span>
        <span class="ii-tool">${isQ?"❓ asking a question":"🔐 "+esc(s.pending.tool_name)+" needs approval"}</span>
        <span class="ii-wait">waiting ${fmtDuration(s.pending.waiting_seconds)}</span>
        <a class="ii-jump" href="#sc-${s.id}">answer →</a></div>`; }).join("")}</div>`;
}
function projectShell(p){
  // Built ONCE per project (only when the project set changes). The spawn
  // textarea lives here untouched by polling, so typing is never interrupted.
  return `<div class="project" id="proj-${p.id}">
    <div class="project-head">
      <h3>${esc(p.name)}<span class="sess-count" id="sc-count-${p.id}"></span></h3>
      <span class="ho-slot" id="ho-${p.id}"></span>
    </div>
    <div class="spawn">
      <textarea id="prompt-${p.id}" placeholder="New session prompt for ${esc(p.name)}…"></textarea>
      <div class="ctl"><label>model</label><select id="model-${p.id}">
        <option value="">default</option><option value="sonnet">sonnet</option><option value="opus">opus</option><option value="haiku">haiku</option></select></div>
      <label class="toggle auto-tog" title="Run tools without asking for approval (questions still surface)"><input type="checkbox" id="auto-${p.id}"><span class="track"></span><span>⚡ auto</span></label>
      <button class="primary" onclick="spawn(${p.id})">Launch</button>
    </div>
    <div class="cards" id="cards-${p.id}"></div>
  </div>`;
}
function renderProjects(){
  const host = $("#fl-projects");
  const projects = fleet.projects||[];
  if(!projects.length){ host.innerHTML = `<div class="fleet-na">No projects yet. Use “+ New Project”.</div>`; host._pids=""; return; }
  // Only rebuild the DOM skeleton when the set of projects changes — otherwise
  // we'd recreate (and wipe) the prompt textarea on every 1.5s poll.
  const sig = projects.map(p=>p.id).join(",");
  if(host._pids!==sig){ host.innerHTML = projects.map(projectShell).join(""); host._pids=sig; }
  // Per-poll: refresh only the volatile bits, never the spawn form.
  projects.forEach(p=>{
    const sessions = (fleet.sessions||[]).filter(s=>s.project_id===p.id);
    const cc = document.getElementById(`sc-count-${p.id}`);
    if(cc) cc.textContent = `${sessions.length} session${sessions.length===1?"":"s"}`;
    const ho = p.handoff, hoEl = document.getElementById(`ho-${p.id}`);
    if(hoEl){
      const html = ho
        ? `<span class="handoff-title"><span class="ho-tag">HANDOFF</span>${esc(ho.title||"")}</span>`
          + (ho.flags&&ho.flags.length?`<details class="handoff-flags"><summary>👁 ${ho.flags.length} need${ho.flags.length>1?"":"s"} eyes</summary><ul>${ho.flags.map(f=>`<li>${esc(f)}</li>`).join("")}</ul></details>`:"")
        : `<span class="handoff-none">no HANDOFF.md</span>`;
      if(hoEl._html!==html){ hoEl.innerHTML=html; hoEl._html=html; }  // skip if unchanged (keeps <details> open)
    }
    const cards = document.getElementById(`cards-${p.id}`);
    if(cards) cards.innerHTML = sessions.map(scard).join("")||"<div class='hint'>No sessions yet.</div>";
  });
}
function scard(s){
  const dur = fmtDuration((s.ended||fleet.now)-s.created);
  const ctxPct = s.rotate_at_tokens?Math.min(100,100*s.context_tokens/s.rotate_at_tokens):0;
  const ctxClass = ctxPct>85?"hot":ctxPct>60?"warn":"";
  const live = !["done","error","interrupted"].includes(s.status);
  const body = s.last_text || s.prompt || "";
  return `<div class="scard" data-status="${esc(s.status)}" id="sc-${s.id}">
    <div class="scard-top">
      <span class="status"><span class="led"></span>${esc(s.status)}</span>
      ${s.generation>1?`<span class="badge">⟳ g${s.generation}</span>`:""}
      ${s.run_mode==="auto"?`<span class="badge">⚡ auto</span>`:s.run_mode==="plan"?`<span class="badge">📝 plan</span>`:""}
      <span class="model-chip">${esc(s.model)}</span>
    </div>
    <div class="metrics">
      <span><i>uptime</i><b>${dur}</b></span>
      <span><i>turns</i><b>${s.turns}</b></span>
      <span><i>tokens</i><b>${fmtTokens(s.cumulative_tokens||0)}</b></span>
    </div>
    ${s.rotate_at_tokens?`<div class="ctx-track"><div class="${ctxClass}" style="width:${ctxPct}%"></div></div>
      <div class="ctx-label">context ${fmtTokens(s.context_tokens)} / ${fmtTokens(s.rotate_at_tokens)}</div>`:""}
    <div class="snippet">${esc(body)}</div>
    ${s.pending?pendingHtml(s):""}
    ${live?`<div class="actions">
        ${s.status!=="rotating"?`<button onclick="rotateNow('${s.id}')">⟳ Rotate</button>`:""}
        <button onclick="interrupt('${s.id}')">Interrupt</button>
        <button class="danger" onclick="closeSession('${s.id}')">Close</button></div>`:""}
    ${modeBar(s,"in-card")}
    <button class="chat-open" onclick="openChat('${s.id}')">💬 Chat${s.subagents&&s.subagents.length?` · 🌿 ${s.subagents.length}`:""}</button>
  </div>`;
}
function pendingHtml(s){
  const p=s.pending;
  if(p.tool_name==="AskUserQuestion"){
    const questions=(p.input.questions||[]); const cur=answersInProgress[s.id]||{};
    return `<div class="pending"><h5>❓ Claude is asking</h5>
      ${questions.map((q,qi)=>`<div style="margin-bottom:8px"><div style="font-size:12px;margin-bottom:5px">${esc(q.question)}</div>
        ${(q.options||[]).map(o=>`<button class="opt ${cur[q.question]===o.label?"selected":""}"
          onclick="pickOption('${s.id}',${qi},'${esc(o.label).replace(/'/g,"\\'")}')">${esc(o.label)}<small>${esc(o.description||"")}</small></button>`).join("")}
        <input type="text" id="free-${s.id}-${qi}" placeholder="…or type your own"></div>`).join("")}
      <button class="primary" onclick="submitAnswers('${s.id}')">Answer</button></div>`;
  }
  return `<div class="pending"><h5>🔐 ${esc(p.tool_name)} wants approval</h5>
    <pre>${esc(JSON.stringify(p.input,null,2).slice(0,1200))}</pre>
    <div class="actions"><button class="primary" onclick="allow('${s.id}')">Allow</button>
      <button class="danger" onclick="denyWithMessage('${s.id}')">Deny…</button></div></div>`;
}

/* fleet actions */
async function spawn(pid){
  const prompt=$(`#prompt-${pid}`).value, model=$(`#model-${pid}`).value||null;
  const auto=!!$(`#auto-${pid}`)?.checked;
  if(!prompt.trim()) return;
  // subscription + auto-compact => no token-rotation, no $ cap.
  await post("/fleet/api/sessions",{project_id:pid,prompt,model,rotate_at_tokens:null,max_budget_usd:null,auto_accept:auto});
  const ta=$(`#prompt-${pid}`); if(ta) ta.value=""; pollFleet();
}
function pickOption(sid,qi,label){
  const s=fleet.sessions.find(x=>x.id===sid); if(!s||!s.pending) return;
  const q=s.pending.input.questions[qi]; answersInProgress[sid]=answersInProgress[sid]||{};
  if(q.multiSelect){ const cur=answersInProgress[sid][q.question]; const arr=Array.isArray(cur)?cur:cur?[cur]:[];
    answersInProgress[sid][q.question]=arr.includes(label)?arr.filter(l=>l!==label):[...arr,label]; }
  else answersInProgress[sid][q.question]=label;
  renderProjects();
}
async function submitAnswers(sid){
  const s=fleet.sessions.find(x=>x.id===sid); if(!s||!s.pending) return;
  const questions=s.pending.input.questions||[]; const answers={...(answersInProgress[sid]||{})};
  questions.forEach((q,qi)=>{ const free=$(`#free-${sid}-${qi}`); if(free&&free.value.trim()) answers[q.question]=free.value.trim(); });
  if(Object.keys(answers).length<questions.length){ alert("Answer every question."); return; }
  await post(`/fleet/api/sessions/${sid}/answer`,{kind:"answers",answers}); delete answersInProgress[sid]; pollFleet();
}
async function allow(sid){ await post(`/fleet/api/sessions/${sid}/answer`,{kind:"allow"}); pollFleet(); }
async function denyWithMessage(sid){ const m=window.prompt("Why deny / what instead?",""); if(m===null) return;
  await post(`/fleet/api/sessions/${sid}/answer`,{kind:"deny",message:m||"Denied from panel."}); pollFleet(); }
const MODE_LABEL={default:"⛊ Manual", auto:"⚡ Auto-accept", plan:"📝 Plan"};
const MODE_HINT ={default:"approve each tool", auto:"tools run without asking", plan:"plans only — no edits"};
function modeBar(s,where){
  if(["done","error","interrupted"].includes(s.status)) return "";
  const m=s.run_mode||"default";
  return `<div class="modebar ${where||""}" title="Tool-permission mode (no shift+tab needed)">${
    ["default","auto","plan"].map(k=>`<button class="modeb ${m===k?"on":""}"
      onclick="setMode('${s.id}','${k}')">${MODE_LABEL[k]}</button>`).join("")
    }<span class="mode-hint">${MODE_HINT[m]}</span></div>`;
}
async function setMode(sid,mode){ await post(`/fleet/api/sessions/${sid}/mode`,{mode}); pollFleet(); }
async function rotateNow(sid){ await post(`/fleet/api/sessions/${sid}/rotate`); pollFleet(); }
async function interrupt(sid){ await post(`/fleet/api/sessions/${sid}/interrupt`); pollFleet(); }
async function closeSession(sid){ await post(`/fleet/api/sessions/${sid}/close`); pollFleet(); }

/* chat modal */
async function openChat(sid){
  chat.sid=sid; chat.renderedCount=-1;
  try{ chat.data=await getJSON(`/fleet/api/sessions/${sid}/messages`); }catch{ chat.data={messages:[],model_usage:[],subagents:[]}; }
  const m=document.createElement("div"); m.className="overlay"; m.id="chat-modal";
  m.innerHTML=`<div class="modal wide">
    <div class="modal-head"><h3 id="chat-title">Chat</h3><button class="x" onclick="closeChat()">✕</button></div>
    <div id="chat-meta" class="chat-meta"></div>
    <div id="chat-modes" class="modebar-row"></div>
    <div id="chat-sa" class="sa-tree" style="display:none"></div>
    <div id="chat-msgs" class="chat-msgs"></div>
    <div class="chat-foot">
      <textarea id="chat-input" placeholder="Message the head agent… (type / for commands)"
        oninput="renderSlash('chat-input')" onblur="closeSlash('chat-input')"
        onkeydown="slashKey(event,'chat-input',sendChat)"></textarea>
      <button class="primary" id="chat-send" onclick="sendChat()">Send ▸</button></div>
  </div>`;
  m.addEventListener("click",e=>{ if(e.target===m) closeChat(); });
  document.body.appendChild(m);
  renderChatBody(); $("#chat-input")?.focus();
}
function closeChat(){ chat.sid=null; document.getElementById("chat-modal")?.remove(); }
function renderChatBody(){
  if(!chat.sid || !document.getElementById("chat-modal")) return;
  const s=(fleet.sessions||[]).find(x=>x.id===chat.sid);
  $("#chat-title").textContent = s?`${s.project_name} — head agent`:"Chat";
  $("#chat-meta").innerHTML = s?`<span class="status" data-status="${esc(s.status)}"><span class="led"></span>${esc(s.status)}</span>
    <span>${esc(s.model)}</span><span>${s.turns} turns</span>
    <span>ctx ${fmtTokens(s.context_tokens)}</span><span>${fmtTokens(s.cumulative_tokens||0)} tokens total</span>`:"";
  const modesEl=$("#chat-modes");
  if(modesEl){ const bar=s?modeBar(s,""):""; modesEl.innerHTML=bar; modesEl.style.display=bar?"":"none"; }
  const subs=chat.data.subagents||[];
  const saEl=$("#chat-sa");
  if(subs.length){ saEl.style.display=""; saEl.innerHTML=subs.map(a=>`<div class="sa-row">
    <span class="led"></span><span class="sa-type">${esc(a.type)}</span>
    <span class="sa-task" title="${esc(a.task||"")}">${esc(a.task||"")}</span>
    <span class="sa-meta">${esc(a.status)} · ${fmtDuration(a.duration)}</span></div>`).join(""); }
  else saEl.style.display="none";
  const msgs=chat.data.messages||[]; const el=$("#chat-msgs");
  if(msgs.length!==chat.renderedCount){
    const atBottom = el.scrollHeight-el.scrollTop-el.clientHeight < 60;
    el.innerHTML = msgs.length?msgs.map(mm=>`<div class="bubble ${esc(mm.role)}"><div class="b-role">${mm.role==="user"?"you":"head agent"}</div><div class="b-text">${esc((mm.text||"").trim())}</div></div>`).join(""):`<div class="hint">No messages yet.</div>`;
    if(atBottom || chat.renderedCount===-1) el.scrollTop=el.scrollHeight;
    chat.renderedCount=msgs.length;
  }
  const canSteer = s && s.status==="idle";
  $("#chat-send").disabled = !canSteer;
  $("#chat-input").placeholder = canSteer?"Message the head agent… (type / for commands)":`Manager is ${s?s.status:"busy"} — follow-ups send once idle`;
}
async function sendChat(){
  const input=$("#chat-input"); const text=input?input.value.trim():""; if(!text||!chat.sid) return;
  await post(`/fleet/api/sessions/${chat.sid}/message`,{text}); input.value=""; chat.renderedCount=-1; pollFleet();
}

/* ---- slash-command autocomplete (shared by head-agent chat + assistant) ---- */
const CC_COMMANDS=[
  {cmd:"/help",    desc:"list available commands"},
  {cmd:"/clear",   desc:"clear the conversation / context"},
  {cmd:"/compact", desc:"summarize older turns to free context"},
  {cmd:"/context", desc:"show context-window usage"},
  {cmd:"/cost",    desc:"show token usage this session"},
  {cmd:"/model",   desc:"show or switch the model"},
  {cmd:"/init",    desc:"generate a CLAUDE.md for the project"},
  {cmd:"/review",  desc:"review the current changes"},
];
const slashPopId=id=>id+"-slash";
function topMatch(inputId){
  const inp=document.getElementById(inputId); const v=(inp?.value||"");
  if(!v.startsWith("/")) return null;
  const q=v.slice(1).toLowerCase().split(/\s/)[0];
  return CC_COMMANDS.find(c=>c.cmd.slice(1).startsWith(q))||null;
}
function renderSlash(inputId){
  const inp=document.getElementById(inputId); if(!inp) return;
  const v=inp.value; let pop=document.getElementById(slashPopId(inputId));
  // Only while typing a command token (a "/word" with no space yet).
  const show = v.startsWith("/") && !/\s/.test(v);
  if(!show){ if(pop) pop.remove(); return; }
  const q=v.slice(1).toLowerCase();
  const matches=CC_COMMANDS.filter(c=>c.cmd.slice(1).startsWith(q));
  if(!matches.length){ if(pop) pop.remove(); return; }
  if(!pop){ pop=document.createElement("div"); pop.id=slashPopId(inputId); pop.className="slash-pop";
    inp.parentElement.style.position="relative"; inp.parentElement.appendChild(pop); }
  pop.innerHTML=matches.map((c,i)=>`<div class="slash-item${i===0?" on":""}"
    onmousedown="event.preventDefault();pickSlash('${inputId}','${c.cmd}')"><b>${c.cmd}</b><span>${esc(c.desc)}</span></div>`).join("");
}
function pickSlash(inputId,cmd){
  const inp=document.getElementById(inputId); if(!inp) return;
  inp.value=cmd+" "; const pop=document.getElementById(slashPopId(inputId)); if(pop) pop.remove(); inp.focus();
}
function closeSlash(inputId){ setTimeout(()=>{ const p=document.getElementById(slashPopId(inputId)); if(p) p.remove(); },150); }
// Enter while the popup is open completes the command; if the typed value is
// already a full command (or has args), Enter sends it via sendFn.
function slashKey(e,inputId,sendFn){
  const pop=document.getElementById(slashPopId(inputId));
  if(e.key==="Escape"&&pop){ e.stopPropagation(); pop.remove(); return; }
  if(e.key==="Enter"&&!e.shiftKey){
    const val=(document.getElementById(inputId)?.value||"").trim();
    const exact=CC_COMMANDS.some(c=>c.cmd===val);
    if(pop&&!exact){ const m=topMatch(inputId); if(m){ e.preventDefault(); pickSlash(inputId,m.cmd); return; } }
    e.preventDefault(); sendFn();
  }
}

/* ===================== 🔒 PRIVATE mode (a mode of the Assistant) =======
   Folded in from the old standalone Private tab. When ON, the Assistant talks
   to a LOCAL Ollama model through the stateless /api/chat/send proxy, which
   writes NOTHING to disk, the ledger, or the token meter; no tools run; the

   you leave. Toggled by the 🔒 button in the composer. */
function toggleIncognito(){
  lm.incognito = !lm.incognito;
  lmClear();   // always start the new mode on a fresh, unsaved slate
  if(lm.incognito){
    // Private = LOCAL model only. If a cloud model is selected, switch to Ollama.
    const sel=$("#lm-model");
    if(sel && !/^ollama:/.test(lm.model||"")){
      const opt=[...sel.options].find(o=>/^ollama:/.test(o.value));
      if(opt){ lm.model=opt.value; sel.value=opt.value; }

/* ---- voice: browser speech-to-text (dictate) + text-to-speech (read aloud) ---- */
const voice = { rec:null, listening:false, speak: localStorage.getItem("pcp_speak")==="1", primed:false, _text:"", _abort:false };
function voiceSTTSupported(){ return ("webkitSpeechRecognition" in window) || ("SpeechRecognition" in window); }
function updateVoiceBtns(){
  const mic=$("#lm-mic"); if(mic) mic.classList.toggle("on", voice.listening);
  const sp=$("#lm-speak"); if(sp){ sp.classList.toggle("on", voice.speak); sp.textContent = voice.speak?"🔊":"🔇"; }
}
function micToggle(){
  if(!voiceSTTSupported()){
    alert("In-app voice input isn't supported in this browser.\nTip: tap the microphone on your phone keyboard to dictate into the box instead.");
    return;
  }
  if(voice.listening){ try{ voice.rec && voice.rec.stop(); }catch{} return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR(); voice.rec = rec;
  rec.lang = "en-US"; rec.interimResults = true; rec.continuous = false;
  voice._abort = false; voice._text = "";
  rec.onresult = e=>{ let t=""; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript;
    voice._text=t; const inp=$("#lm-input"); if(inp) inp.value=t; };
  rec.onerror = ()=>{ voice._abort = true; };
  rec.onend = ()=>{ voice.listening=false; updateVoiceBtns();
    if(!voice._abort && voice._text.trim()) lmSend(); };   // hands-free: dictate then auto-send
  try{ rec.start(); voice.listening=true; updateVoiceBtns(); }catch{ voice.listening=false; }
}
function speakToggle(){
  voice.speak = !voice.speak; localStorage.setItem("pcp_speak", voice.speak?"1":"0");
  // iOS only allows speech started from a user gesture — prime it on enable.
  if(voice.speak && window.speechSynthesis && !voice.primed){
    try{ window.speechSynthesis.speak(new SpeechSynthesisUtterance(" ")); voice.primed=true; }catch{}
  }
  if(!voice.speak && window.speechSynthesis) window.speechSynthesis.cancel();
  updateVoiceBtns();
}
function speak(text){
  if(!voice.speak || !window.speechSynthesis || !text) return;
  try{ window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(text).slice(0,700)); u.rate=1.0;
    window.speechSynthesis.speak(u);
  }catch{}
}
/* (removed dead code: buildLocalChat / buildAutopilot / ap* autopilot + the old
   floating chat bubble — superseded by the Claude-style Assistant home and the

async function lmRefresh(){
  const sel=$("#lm-model"), status=$("#lm-status"), send=$("#lm-send");
  const opts=[]; let claudeAvail=false, ollamaOnline=false;

  let st; try{ st=await getJSON("/api/chat/status"); }catch{ st={available:false}; }
  ollamaOnline = !!st.available;
  if(ollamaOnline){ try{ ((await getJSON("/api/chat/models")).models||[]).forEach(m=>
    opts.push({spec:"ollama:"+m.name, label:m.name+(m.param_size?` · ${esc(m.param_size)}`:"")})); }catch{} }
  if(!opts.length){
    sel.innerHTML=`<option>— no models —</option>`; sel.disabled=true; send.disabled=true;
    status.innerHTML = `No models · <a href="#" onclick="lmStart();return false">start Ollama</a> · <a href="#" onclick="lmRefresh();return false">retry</a>`;
    return;
  }
  sel.disabled=false; send.disabled=false;
  sel.innerHTML = opts.map(o=>`<option value="${esc(o.spec)}">${esc(o.label)}</option>`).join("");
  const stored=localStorage.getItem("pcp_asst_model");
  if(stored && opts.find(o=>o.spec===stored)) lm.model=stored;                       // user's pick
  else if(!lm.model || !opts.find(o=>o.spec===lm.model))                              // default = Opus
    lm.model = (opts.find(o=>o.spec==="claude:claude-opus-4-8")||opts[0]).spec;
  sel.value = lm.model;
  // Ollama state always shown; when offline, offer to start it even if Claude is
  // present — local models are what 🔒 Private needs.
  const ollamaBit = ollamaOnline ? "Ollama online"
    : `Ollama offline — <a href="#" onclick="lmStart();return false">start it</a> for local & Private`;
  status.innerHTML = [claudeAvail?"☁ Claude available":"", ollamaBit].filter(Boolean).join(" · ");
}
async function lmStart(){
  $("#lm-status").textContent = "starting Ollama…";
  try{ await post("/api/chat/start"); }catch{}
  setTimeout(lmRefresh, 1800);
}
function lmClear(){ lm.messages=[]; lm.runId=null; lmRenderMsgs(); }
function lmRenderMsgs(){
  const el=$("#lm-msgs"); if(!el) return;
  el.innerHTML = lm.messages.length ? lm.messages.map(m=>{
    if(m.role==="thinking") return `<div class="lm-think">${esc(m.content)}</div>`;
    if(m.role==="user") return `<div class="bubble user"><div class="b-role">you</div>${esc(m.content)}</div>`;
    // assistant — may carry live tool activity + an inline approval prompt
    const act = (m.activity&&m.activity.length)
      ? `<div class="asst-act">${m.activity.map(esc).join("  ·  ")}</div>` : "";
    const appr = m.pending
      ? `<div class="asst-approve">🔐 <b>${esc(m.pending.tool)}</b> ${esc(JSON.stringify(m.pending.args||{}).slice(0,90))}
          <div style="margin-top:6px"><button class="primary" onclick="asstApprove(true)">Allow</button>
          <button class="danger" onclick="asstApprove(false)">Deny</button></div></div>` : "";
    // While the run is in flight, show an animated loading bar + live status
    // instead of the stagnant "working…" text. Final text replaces it when done.
    const loading = m.loading
      ? `<div class="asst-status"><span class="dot"></span>${esc(m.statusText||"working…")}</div><div class="lm-loader"></div>`
      : "";
    const txt = m.loading ? "" : esc(m.content);
    return `<div class="bubble assistant"><div class="b-role">assistant</div>${txt}${loading}${act}${appr}</div>`;
  }).join("") : "";
  updateAsstHome();
  el.scrollTop = el.scrollHeight;
}
// The bubble's Chat is a TOOL-USING agent. It posts to /api/assistant/send and
// then polls the run (same shape as a crew run) so danger/MCP tool calls surface
// as inline approvals — going through the identical approver as crew workers.
async function lmSend(){
  const input=$("#lm-input"); const text=input?input.value.trim():"";
  if(!text || lm.busy || !lm.model) return;
  // Slash commands handled locally: the assistant runs one-shot per message, so
  // session commands like /compact don't apply — but these do something useful.
  const cmd=text.toLowerCase();
  if(cmd==="/clear"){ input.value=""; lmClear(); return; }
  if(cmd==="/help"){
    input.value="";
    lm.messages.push({role:"user",content:text});
    lm.messages.push({role:"assistant",content:"Commands you can type here:\n"+
      CC_COMMANDS.map(c=>`${c.cmd} — ${c.desc}`).join("\n")+
      "\n\n(I run fresh each message, so /clear and /help work here; the rest are full Claude Code commands best used in a head-agent session.)"});
    lmRenderMsgs(); return;
  }
  lm.messages.push({role:"user",content:text}); input.value="";
  lm.busy=true; const send=$("#lm-send"); send.disabled=true; send.textContent="…";
  const a={role:"assistant",content:"",activity:[],pending:null,loading:true,statusText:"thinking…"}; lm.messages.push(a); lmRenderMsgs();
  const history = lm.messages.filter(m=>m.role==="user"||m.role==="assistant").slice(0,-1)
                    .map(m=>({role:m.role,content:m.content}));
  try{
    if(lm.incognito){
      // 🔒 Private: stateless LOCAL chat — no tools, no run, nothing written server-side.
      const convo = lm.messages.slice(0,-1)   // exclude the in-flight placeholder
        .filter(m=>m.role==="user"||m.role==="assistant").map(m=>({role:m.role,content:m.content}));
      // /api/chat/send is a bare-Ollama proxy — strip the "ollama:" role prefix.
      const d = await post("/api/chat/send",{model:(lm.model||"").replace(/^ollama:/,""), messages:convo});
      a.loading=false; a.statusText=""; a.content=(d&&d.reply)||"(no reply)"; lmRenderMsgs();
    } else {
      const r = await post("/api/assistant/send",{text, model:lm.model, history, incognito:lm.incognito});
      lm.runId = r.run_id;
      await asstPoll(a);
    }
  }catch(e){ a.loading=false; a.content="⚠ couldn't reach the assistant."; }
  finally{ lm.busy=false; send.disabled=false; send.textContent="↑"; lmRenderMsgs(); input.focus(); }
}
async function asstPoll(a){
  for(let i=0;i<600;i++){
    let r; try{ r=await getJSON("/api/crew/runs/"+lm.runId); }catch{ await sleep(500); continue; }
    a.activity = (r.events||[]).filter(e=>["tool_call","tool_result","tool_denied"].includes(e.type))
      .map(e=> e.type==="tool_call" ? `→ ${e.tool}`
             : e.type==="tool_denied" ? `✕ ${e.tool} denied` : `✓ ${e.tool}`);
    a.pending = r.pending || null;
    if(r.pending){ a.loading=false; a.content="Awaiting your approval…"; }
    else if(r.status==="done"){ a.loading=false; a.content=r.final||"(done)"; a.pending=null; lmRenderMsgs(); speak(a.content); return; }
    else if(r.status==="error"){ a.loading=false; a.content="⚠ "+(r.error||"error"); lmRenderMsgs(); return; }
    else {
      // In flight — drive the loading bar with a live status from the latest tool.
      a.loading=true;
      const lastTool=[...(r.events||[])].reverse().find(e=>e.type==="tool_call");
      a.statusText = r.status==="blocked" ? "awaiting approval…"
                   : lastTool ? `running ${lastTool.tool}…` : "thinking…";
    }
    lmRenderMsgs();
    await sleep(600);
  }
}
async function asstApprove(ok){
  if(!lm.runId) return;
  let note=""; if(!ok) note=window.prompt("Why deny / what instead?","")||"";
  try{ await post(`/api/crew/runs/${lm.runId}/approve`,{approved:ok,note}); }catch{}
}

function rsEstimate(){
  const el=$("#rs-estimate"); if(!el) return;
  const build=$("#rs-build")?.checked;
  const auto=$("#rs-auto")?.checked;
  const go=$("#rs-go"); if(go) go.innerHTML = auto ? "✨ Create ▸" : (build ? "🔨 Build ▸" : "🔬 Research ▸");
  if(auto){
    el.innerHTML = `✨ <b>Auto</b> — a planner reads your idea and picks the swarm size, rounds, and ${build?"<b>builds it</b>":"whether to <b>research or build</b>"}. Just describe it and hit Create.`;
    return;
  }
  const m=Math.max(0,Math.min(8,parseInt($("#rs-n-sub")?.value)||0));
  const k=Math.max(1,Math.min(10,parseInt($("#rs-n-wkr")?.value)||1));
  const rounds=Math.max(1,Math.min(5,parseInt($("#rs-rounds")?.value)||1));
  if(build){
    const r=Math.max(1,rounds), rr=rounds>1?rounds:3;
    el.innerHTML = `🔨 <b>Build</b>: lead plans → ${k} researchers gather current info → builders write & test → re-plan each round (<b>${rr} rounds</b>, runs unattended). <span style="color:var(--warn)">Builds a real project in a workspace folder.</span>`;
    return;
  }
  const researchers = m<=0 ? k : m*k;
  const agents = 1 + (m<=0?0:m) + researchers;
  const loop = rounds>1 ? ` · <b>${rounds} rounds</b> — manager re-plans each round` : "";
  el.innerHTML = `🔬 <b>Research</b>: ${m<=0?`1 manager → <b>${k}</b> researchers`:`1 manager → <b>${m}</b> sub-managers → <b>${researchers}</b> researchers`}${loop} → ranked report.`;

/* ---- build the hierarchy from a run's event stream ----
   Nodes PERSIST in a per-run cache so they never vanish when their events scroll out
   of the server's last-120-event window (the cause of "agents randomly disappearing").
   Tokens use the cumulative `total` (max), so re-seeing events across polls can't
   double-count. */
const _treeNodes={};
function researchTree(r){
  const now=Date.now()/1000;
  const nodes=_treeNodes[r.id]||(_treeNodes[r.id]={});
  const get=(key,role)=>(nodes[key]||(nodes[key]={key,role:role||"",tokens:0,rate:null,t:0,act:"",branch:null,round:null,title:"",texts:[],done:false,model:""}));
  for(const e of (r.events||[])){
    const key=(e.worker_id!=null)?("w"+e.worker_id):(e.role||e.agent||"?");
    const role=e.role||(e.worker_id!=null?"worker":"");
    const n=get(key,role);
    if(role && !n.role) n.role=role;
    if(e.branch!=null) n.branch=e.branch;
    if(e.round!=null) n.round=e.round;
    if(e.agent) n.model=e.agent;
    if(e.type==="usage"){ if(e.total!=null) n.tokens=Math.max(n.tokens, e.total); else n.tokens+=(e.tokens||0);
      if((e.t||0)>=n.t){ n.t=e.t||0; if(e.rate!=null)n.rate=e.rate; } }
    else if(e.type==="branch"){ if(e.title)n.title=e.title; }
    else if(e.type==="tool_call"){ n.act="→ "+(e.tool||""); if(e.angle)n.title=e.angle; if((e.t||0)>=n.t)n.t=e.t||0; }
    else if(e.type==="tool_result"){ n.done=true; }
    else if(e.type==="error"){ n.err=true; n.errText=(e.text||""); }
    else if(e.type==="text" && e.role){ if((e.text||"").trim() && !n.texts.includes(e.text)) n.texts.push(e.text); if(!n.title && role!=="manager") n.title=(e.text||"").slice(0,80); }
  }
  for(const k in nodes){ const n=nodes[k]; n.live=(now-n.t)<12 && n.rate>0;
    n.status = (n.err && !n.live) ? "error" : (n.live?"live":((n.done||n.tokens>0||r.status==="done")?"done":"idle")); }
  const mgr = nodes["manager"] || {key:"manager",role:"manager",tokens:0,rate:null,title:"",texts:[],status:r.status==="done"?"done":(r.status==="planning"||r.status==="working"||r.status==="reviewing"?"live":"idle")};
  mgr.title = r.goal;
  const byIdx=(a,b)=>(parseInt(a.key.slice(1))||0)-(parseInt(b.key.slice(1))||0);
  const subs = Object.values(nodes).filter(n=>n.role==="submanager").sort((a,b)=>(a.branch??0)-(b.branch??0));
  const researchers = Object.values(nodes).filter(n=>n.role==="worker").sort(byIdx);
  const tiered = (r.research && r.research.n_submanagers>0) || subs.length>0;
  return {mgr, subs, researchers, tiered, byKey:nodes};
}

/* ---- lay out + draw the graph (HTML nodes + SVG edges, CSS-transform pan/zoom) ---- */
const NW=166, NH=66, GAPX=18, LEVELY=118;
function drawGraph(r){
  const canvas=$("#rgcanvas"); if(!canvas) return;
  const t=researchTree(r);
  const groups = t.tiered
    ? t.subs.map(s=>({sub:s, kids:t.researchers.filter(n=>n.branch===s.branch)}))
    : [{sub:null, kids:t.researchers}];
  // assign leaf x slots
  let col=0; const NWG=NW+GAPX;
  for(const g of groups){
    if(g.kids.length===0){ if(g.sub) g.sub._x=col*NWG; col++; }
    else { for(const k of g.kids){ k._x=col*NWG; col++; }
           if(g.sub) g.sub._x=(g.kids[0]._x+g.kids[g.kids.length-1]._x)/2; }
  }
  const totalW = Math.max(col*NWG, NW);
  t.mgr._x = totalW/2 - NW/2; t.mgr._y=0;
  t.subs.forEach(s=>s._y=LEVELY);
  t.researchers.forEach(n=>n._y = t.tiered?2*LEVELY:LEVELY);
  const depth = t.tiered?2:1;
  const W=totalW+40, H=depth*LEVELY+NH+40;
  _lastWH={W,H};
  const allNodes=[t.mgr,...t.subs,...t.researchers];
  // live token HUD (always refreshed — cheap)
  let total=0,rate=0,active=0;
  for(const n of allNodes){ total+=n.tokens||0; if(n.live){ rate+=(n.rate||0); active++; } }
  updateHud(total, Math.round(rate*10)/10, active, allNodes.length, r.status);
  // content signature — only rebuild the DOM when something actually changed (keeps
  // the node pulse + zoom transition from restarting every poll).
  const sig=JSON.stringify(allNodes.map(n=>[n.key,n.status,n.tokens,Math.round(n.rate||0),n.title||n.act,n._x,n._y,researchSel.node===n.key]));
  if(sig===_graphSig && canvas.children.length) return;
  _graphSig=sig;
  const edges=[];
  const edge=(p,c)=>{ if(!p||!c||p._x==null||c._x==null) return;
    const hot=(c.status==="live");
    const x1=p._x+NW/2+20, y1=p._y+NH+20, x2=c._x+NW/2+20, y2=c._y+20, my=(y1+y2)/2;
    edges.push(`<path class="redge ${hot?'hot':''}" d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}"/>`); };
  if(t.tiered){ t.subs.forEach(s=>{ edge(t.mgr,s); t.researchers.filter(n=>n.branch===s.branch).forEach(n=>edge(s,n)); });
    t.researchers.filter(n=>n.branch==null).forEach(n=>edge(t.mgr,n));
  } else t.researchers.forEach(n=>edge(t.mgr,n));
  const nodeHtml=n=>{ if(n._x==null) return "";
    const tok = n.tokens?`${fmtTokens(n.tokens)} tok${n.rate>0?` · ${n.rate} t/s`:""}`:"";
    return `<div class="rnode ${n.role==="manager"?"mgr":""} ${n.status} ${researchSel.node===n.key?"sel":""}"
      style="left:${n._x+20}px;top:${n._y+20}px" onclick="pickNode('${n.key}')">
      <div class="rn-top"><span class="rn-ico">${nodeIcon(n)}</span><span class="rn-role">${esc(nodeRole(n))}</span>${n.round!=null&&n.role==="worker"?`<span class="rn-rnd">R${n.round+1}</span>`:""}<span class="led"></span></div>
      <div class="rn-title">${esc(n.title||n.act||"…")}</div>
      <div class="rn-tok">${tok||"&nbsp;"}</div></div>`; };
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  canvas.innerHTML = `<svg class="rgraph-edges" width="${W}" height="${H}">${edges.join("")}</svg>` + allNodes.map(nodeHtml).join("");
  if(!rView.userMoved) fitToView(); else applyTransform();   // re-frame as the tree grows, unless user navigated
}
function updateHud(total, rate, active, count, status){
  const tk=$("#th-tokens"); if(!tk) return;
  if(total!==_hudPrev && _hudPrev>=0 && total>_hudPrev){ tk.classList.remove("flash"); void tk.offsetWidth; tk.classList.add("flash"); }
  _hudPrev=total;
  tk.textContent=fmtTokens(total);
  $("#th-rate").textContent = rate>0?rate:"—";
  $("#th-agents").textContent = active+" / "+count;
  $("#th-status").textContent = status||"";
}
function nodeIcon(n){ return n.role==="manager"?"👔":n.role==="submanager"?"🧭":n.role==="worker"?"🔍":"•"; }
function nodeRole(n){
  if(n.role==="manager") return "manager";
  if(n.role==="submanager") return "sub-mgr "+((n.branch??0)+1);
  if(n.role==="worker") return "researcher "+((parseInt(n.key.slice(1))||0)+1);
  return n.role||"agent";
}
function renderList(r,t){
  t=t||researchTree(r);
  const nodes=[t.mgr,...t.subs,...t.researchers].filter(n=>n.tokens>0||n.act||n.role==="manager");
  let total=0,rate=0,active=0; for(const n of nodes){ total+=n.tokens||0; if(n.live){ rate+=n.rate||0; active++; } }
  const sel=researchSel.node?(t.byKey[researchSel.node]||(researchSel.node==="manager"?t.mgr:null)):null;
  const rows=nodes.map(n=>`<tr class="lrow ${n.status} ${researchSel.node===n.key?"sel":""}" onclick="pickNode('${n.key}')">
    <td class="lc-role"><span class="led"></span> ${nodeIcon(n)} ${esc(nodeRole(n))}${n.round!=null&&n.role==="worker"?` <span class="rn-rnd">R${n.round+1}</span>`:""}</td>
    <td class="lc-stat">${esc(n.status)}</td>
    <td class="lc-num">${n.tokens?fmtTokens(n.tokens):"—"}</td>
    <td class="lc-num">${n.rate>0?n.rate:"—"}</td>
    <td class="lc-act">${esc(n.title||n.act||"…")}</td></tr>`).join("");
  const body=sel?(sel.texts||[]).join("\n\n").trim():"";
  const detail=sel?`<div class="ldetail"><div class="ld-h">${nodeIcon(sel)} ${esc(nodeRole(sel))} <span class="hm">· ${esc(sel.model||"")} · ${esc(sel.status)}${sel.tokens?` · ${fmtTokens(sel.tokens)} tok`:""}</span></div>
    <div class="ld-body">${body?esc(body):'<span class="hm">No findings reported yet…</span>'}</div></div>`
    :`<div class="hm" style="padding:10px 2px">Click a row to read that agent's findings.</div>`;
  return `<div class="tok-hud">
      <div class="th-item"><span class="th-num">${fmtTokens(total)}</span><span class="th-lbl">tokens</span></div>
      <div class="th-item"><span class="th-num hot">${rate>0?Math.round(rate*10)/10:"—"}</span><span class="th-lbl">tok / sec ⚡</span></div>
      <div class="th-item"><span class="th-num">${active} / ${nodes.length}</span><span class="th-lbl">agents live</span></div>
      <span class="th-status">${esc(r.status)}</span></div>
    <table class="ltable"><thead><tr><th>Agent</th><th>Status</th><th>Tokens</th><th>tok/s</th><th>Activity / finding</th></tr></thead><tbody>${rows}</tbody></table>
    ${detail}`;
}
function applyTransform(){ const c=$("#rgcanvas"); if(c) c.style.transform=`translate(${rView.x}px,${rView.y}px) scale(${rView.scale})`; }
function rzoom(f){ rView.scale=Math.max(0.25,Math.min(2.4,rView.scale*f)); applyTransform(); }
function fitToView(){ const vp=$("#rgvp"); if(!vp) return; const {W,H}=_lastWH;
  const vw=vp.clientWidth||1000, vh=vp.clientHeight||700, pad=90;
  const s=Math.max(0.35,Math.min(1.8, Math.min((vw-pad)/W,(vh-pad)/H)));
  rView.scale=s; rView.x=(vw-W*s)/2;
  rView.y=Math.max(40, Math.min((vh-H*s)/2, 110));   // near-top, gently centered, never floating low
  applyTransform(); }
function rfit(){ rView.userMoved=false; fitToView(); }
let _rgWindowWired=false;
function wireGraphPanZoom(){
  // window-level drag handlers are attached ONCE (the viewport is rebuilt every poll,
  // so per-vp handlers would otherwise leak). vp-specific handlers ride on the element.
  if(!_rgWindowWired){

/* ---- tiny markdown -> HTML (headings, lists, bold/italic/code, links, hr, code blocks) ---- */
function mdToHtml(md){
  const e=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inl=t=>e(t).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/(^|[^*])\*([^*]+?)\*/g,"$1<em>$2</em>")
    .replace(/`([^`]+?)`/g,"<code>$1</code>").replace(/\[(.+?)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  const lines=(md||"").replace(/^[ \t]*▎[ \t]?/gm,"").split(/\r?\n/);   // strip wrap-artifact prefix
  const isSep=s=>/^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(s);
  const cells=s=>s.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(x=>x.trim());
  let html="",ul=false,ol=false,code=false,buf="";
  const close=()=>{ if(ul){html+="</ul>";ul=false;} if(ol){html+="</ol>";ol=false;} };
  for(let i=0;i<lines.length;i++){
    const raw=lines[i];
    if(/^```/.test(raw)){ if(code){html+=`<pre><code>${e(buf)}</code></pre>`;buf="";code=false;} else {close();code=true;} continue; }
    if(code){ buf+=raw+"\n"; continue; }
    const l=raw.trimEnd(); let m;
    // markdown table: a |-row immediately followed by a |---|---| separator
    if(l.includes("|") && i+1<lines.length && isSep(lines[i+1])){
      close(); const head=cells(l); const rows=[]; i+=2;
      while(i<lines.length && lines[i].includes("|") && lines[i].trim()){ rows.push(cells(lines[i])); i++; }
      i--;
      html+=`<table><thead><tr>${head.map(h=>`<th>${inl(h)}</th>`).join("")}</tr></thead><tbody>`+
        rows.map(r=>`<tr>${r.map(c=>`<td>${inl(c)}</td>`).join("")}</tr>`).join("")+`</tbody></table>`;
      continue;
    }
    if(/^#{1,6}\s/.test(l)){ close(); const lv=l.match(/^#+/)[0].length; html+=`<h${lv}>${inl(l.replace(/^#+\s/,""))}</h${lv}>`; }
    else if(/^(\-\-\-|\*\*\*|___)\s*$/.test(l)){ close(); html+="<hr>"; }
    else if(m=l.match(/^\s*[-*]\s+(.*)/)){ if(!ul){close();html+="<ul>";ul=true;} html+=`<li>${inl(m[1])}</li>`; }
    else if(m=l.match(/^\s*\d+[.)]\s+(.*)/)){ if(!ol){close();html+="<ol>";ol=true;} html+=`<li>${inl(m[1])}</li>`; }
    else if(!l.trim()){ close(); }
    else { close(); html+=`<p>${inl(l)}</p>`; }
  }
  close(); if(code) html+=`<pre><code>${e(buf)}</code></pre>`;
  return html;
}
function splitSlides(md){

}

// Clean per-subtask timeline from the run's event stream (no raw spam).
function subtaskTimeline(r, w){
  const evs=(r.events||[]).filter(e=>e.worker_id===w.id);
  const steps=[];
  for(const e of evs){
    if(e.type==="phase" && /attempt \d+/.test(e.text||"")){
      const m=(e.text||"").match(/attempt (\d+)\/(\d+)/);
      steps.push(`<div class="tl-step tl-attempt">Attempt ${m?esc(m[1]):"?"}</div>`);
    } else if(e.type==="tool_call"){
      steps.push(`<div class="tl-step tl-tool">→ ${esc(e.tool)} ${summarizeArgs(e.tool,e.args)}</div>`);
    } else if(e.type==="ownership_refused"){
      steps.push(`<div class="tl-step tl-bad">✕ refused write ${esc(e.path||"")}</div>`);
    } else if(e.type==="tool_denied"){
      steps.push(`<div class="tl-step tl-bad">✕ denied ${esc(e.tool)} ${esc(e.note||"")}</div>`);
    } else if(e.type==="approval_needed"){
      steps.push(`<div class="tl-step tl-warn">🔐 awaiting approval: ${esc(e.tool)}</div>`);
    } else if(e.type==="gate"){
      const ph=e.phase==="review"?"Review gate":`Gate (attempt ${esc(e.attempt||"")})`;
      const v=e.manual?"manual · no check":(e.passed?"PASS":"FAIL");
      const tail=(e.output||"").trim().split(/\n/).slice(-1)[0].slice(0,80);
      steps.push(`<div class="tl-step ${e.passed?"tl-pass":(e.manual?"":"tl-bad")}">${ph}: <b>${v}</b>${tail?` · ${esc(tail)}`:""}</div>`);
    } else if(e.type==="error"){
      steps.push(`<div class="tl-step tl-bad">⚠ ${esc((e.text||"").slice(0,100))}</div>`);
    } else if(e.type==="weak_check"){
      steps.push(`<div class="tl-step tl-warn">weak check: ${esc(e.reason||"")}</div>`);
    } else if(e.type==="rejected_acceptance"){
      steps.push(`<div class="tl-step tl-warn">acceptance rejected: ${esc(e.command||"")}</div>`);
    }
  }
  return steps.length ? `<div class="tl">${steps.join("")}</div>`
    : `<div class="tl"><div class="tl-step tl-dim">queued…</div></div>`;
}

  const now = Date.now()/1000, map = {};
  const get = (key, role) => (map[key] || (map[key] = {key, role:role||"", tokens:0, rate:null, t:0, act:""}));
  for(const e of (r.events||[])){
    const key = (e.worker_id!=null) ? ("w"+e.worker_id) : (e.role || e.agent || "?");
    const role = e.role || (e.worker_id!=null ? "worker" : "");
    if(e.type==="usage"){
      const n=get(key,role); n.tokens += (e.tokens||0);
      if((e.t||0)>=n.t){ n.t=e.t||0; if(e.rate!=null) n.rate=e.rate; }
    } else if(e.type==="tool_call"){
      const n=get(key,role); n.act = "→ "+(e.tool||"")+" "+summarizeArgs(e.tool,e.args);
    } else if(e.type==="text" && e.role){
      const n=get(key,role); if(!n.act) n.act=(e.text||"").slice(0,70);
    }
  }
  const nodes = Object.values(map).filter(n=>n.tokens>0 || n.act);
  const ord = {manager:0, submanager:1, worker:2};
  nodes.sort((a,b)=>(ord[a.role]??3)-(ord[b.role]??3) || a.key.localeCompare(b.key,undefined,{numeric:true}));
  let total=0, rate=0; const byKey={};
  for(const n of nodes){
    total += n.tokens; byKey[n.key]=n;
    n.live = (now-n.t)<12 && n.rate>0;
    if(n.live){
      const ck=r.id+"|"+n.key, prev=_rateSmooth[ck];
      n.disp = prev==null ? n.rate : Math.round((prev*0.5+n.rate*0.5)*10)/10;  // ewma -> seamless
      _rateSmooth[ck]=n.disp; rate += n.disp;
    } else n.disp=null;
  }
  return {nodes, byKey, total, rate:Math.round(rate*10)/10};
}
function tokChip(tokens, rate){
  if(!tokens && !rate) return "";
  return `<span class="tok-chip${rate>0?" hot":""}">${fmtTokens(tokens||0)} tok${rate>0?` · <b>${rate} tok/s</b>`:""}</span>`;
}
function nodeLabel(role, key){
  if(role==="manager") return "manager";
  const id = parseInt(String(key).replace(/^w/,""));
  if(role==="submanager") return "sub-mgr "+(isNaN(id)?key:(id>=1000?id-1000:id));
  if(role==="worker") return "agent "+(isNaN(id)?key:id);
  return role||key;
}
function swarmStrip(su){
  if(!su.nodes.length) return "";
  const rows = su.nodes.map(n=>`<div class="swnode ${n.live?"live":"idle"}">
    <span class="led"></span><span class="sw-role">${esc(nodeLabel(n.role,n.key))}</span>
    <span class="sw-act">${esc(n.act||"")}</span>${tokChip(n.tokens,n.disp)}</div>`).join("");
  return `<div class="swarm"><div class="swarm-head">swarm · live tok/s</div>${rows}</div>`;
}
// Per-round history for the looped autonomous coder. Workers are replaced each
// round (the card shows the latest), so reconstruct the round-by-round arc from
// the event stream: each round's plan size + how the loop ended.
function roundHistory(r){
  if(!(r.code_rounds>1)) return "";
  const items=[];
  for(const e of (r.events||[])){
    if(e.type==="phase" && /^round \d+\/\d+/.test(e.text||"")){ items.push({k:"round",t:e.text}); }
    else if(e.type==="plan" && typeof e.round==="number"){ const last=items[items.length-1]; if(last&&last.k==="round") last.n=(e.plan||[]).length; }
    else if(e.type==="phase" && /(all subtasks passed|no progress|goal complete|stopping early)/i.test(e.text||"")){ items.push({k:"end",t:e.text}); }
  }
  if(!items.length) return "";
  return `<div class="round-hist"><div class="rh-h">⟳ Round history</div>`+
    items.map(it=> it.k==="round"
      ? `<div class="rh-row"><span class="rh-n">${esc(it.t)}</span>${it.n!=null?`<span class="rh-meta">${it.n} subtask${it.n===1?"":"s"}</span>`:""}</div>`
      : `<div class="rh-row rh-end">✓ ${esc(it.t)}</div>`).join("")+`</div>`;
}
function crewRunHtml(r){
  const su = swarmNodes(r);
  const phaseTxt = {planning:"planning",working:"building",reviewing:"reviewing",
    done:"done",blocked:"awaiting approval",error:"error",cancelled:"cancelled"}[r.status]||r.status;
  const live = !["done","error","cancelled"].includes(r.status);
  const wk = (r.workers||[]).map(w=>workerCard(r,w)).join("")
    || `<div class="tl-step tl-dim" style="margin:8px 0">manager is planning subtasks…</div>`;
  const approve = r.pending ? `<div class="crew-approve">
      <h5>🔐 Subtask #${r.pending.worker_id} wants to run <code>${esc(r.pending.tool)}</code></h5>
      <pre>${esc(JSON.stringify(r.pending.args,null,2).slice(0,1000))}</pre>
      <button class="primary" onclick="crewApprove('${r.id}',true)">Allow</button>
      <button class="danger" onclick="crewApprove('${r.id}',false)">Deny</button></div>` : "";
  return `<div class="crew-run" data-status="${esc(r.status)}">
    <div class="crew-run-head">
      <span class="crew-phase"><span class="led"></span>${phaseTxt}</span>
      <span class="crew-goal">${esc(r.goal)}</span>
      ${r.code_rounds>1?`<span class="badge" title="autonomous looped coder">⟳ auto ×${r.code_rounds}</span>`:""}
      <span class="crew-roleschip">mgr ${esc(shortSpec(r.manager))} · wkr ${esc(shortSpec(r.worker_model))} · ${r.elapsed}s${r.cwd?` · 📁 ${esc(r.cwd.split(/[\\\/]/).pop())}`:""}</span>
      ${su.total?tokChip(su.total, su.rate):""}
      ${live?`<button class="danger" onclick="crewCancel('${r.id}')">Stop</button>`:""}
    </div>
    ${approve}
    ${swarmStrip(su)}
    ${roundHistory(r)}
    <div class="wkrs" style="grid-template-columns:1fr">${wk}</div>
    ${r.final?`<div class="crew-final"><h4>Final answer</h4>${esc(r.final)}</div>`:""}
    ${r.error?`<div class="crew-final" style="border-color:var(--bad)"><h4 style="color:var(--bad)">Error</h4>${esc(r.error)}</div>`:""}
  </div>`;
}
function shortSpec(s){ if(!s) return "?"; const p=s.split(":"); return p[0]==="claude"?("claude "+p[1]):(p[p.length-1]||s); }

/* crew history — past runs from crew_db, expandable to per-subtask breakdown */
let crewHist = { sig:null, open:new Set(), detail:{}, showAll:false, runs:[] };
function toggleHistAll(){ crewHist.showAll=!crewHist.showAll; renderHistory(crewHist.runs); }
async function pollHistory(){
  let data; try{ data=await getJSON("/api/crew/history"); }catch{ return; }
  const sig=JSON.stringify(data.runs.map(r=>[r.id,r.status]));
  if(sig===crewHist.sig) return;   // unchanged -> don't re-render (keeps expands open)
  crewHist.sig=sig; renderHistory(data.runs);
}
function renderHistory(runs){
  const el=$("#crew-history-wrap"); if(!el) return;
  if(!runs.length){ el.innerHTML=""; return; }
  crewHist.runs = runs;
  const shown = crewHist.showAll ? runs : runs.slice(0, 3);  // last 3 by default
  const head = `<div class="crew-sub-head">History · ${runs.length} run${runs.length===1?"":"s"}`
    + (runs.length>3 ? ` <span class="hm">· showing ${shown.length}</span>` : "") + `</div>`;
  const rows = shown.map(r=>{
      const opened=crewHist.open.has(r.id);
      const tag=r.tag?`<span class="hm">${esc(r.tag)}</span>`:"";
      return `<div class="hist-run">
        <div class="hist-head" onclick="toggleHist('${r.id}')">
          <span>${opened?"▾":"▸"}</span>
          <span class="hg">${esc(r.goal)}</span>
          ${tag}
          <span class="hist-pf"><span class="p">${r.n_passed}✓</span>${r.n_failed?` <span class="f">${r.n_failed}✗</span>`:""}${r.n_unverified?` <span class="u">${r.n_unverified}⚠</span>`:""}/${r.n_subtasks}</span>
          <span class="hm">${esc(shortSpec(r.manager_spec))}→${esc(shortSpec(r.worker_spec))} · ${esc(r.complexity)} · ${r.elapsed}s · ${esc(r.status)}</span>
        </div>
        ${opened?`<div class="hist-detail" id="hd-${r.id}">${histDetailHtml(r.id)}</div>`:""}
      </div>`;
    }).join("");
  const more = runs.length>3
    ? `<div class="hist-more" onclick="toggleHistAll()">${crewHist.showAll?"▴ Show last 3":`▾ Show all ${runs.length} runs`}</div>`
    : "";
  el.innerHTML = head + rows + more;
}
function histDetailHtml(id){
  const d=crewHist.detail[id];
  if(!d) return `<div class="tl-step tl-dim">loading…</div>`;
  return (d.subtasks||[]).map(s=>{
    const go=s.gate_outcome, cls=go==="passed"?"tag-ok":(go==="failed"||s.status==="error"?"tag-bad":"tag-warn");
    const flags=[s.weak_flagged?"weak":"",s.rejected?"rejected":"",s.regression?"regressed":""].filter(Boolean).join(" ");
    const cov = s.coverage_note ? `<span class="hm" style="flex-basis:100%;${/REAL BUG/.test(s.coverage_note)?"color:var(--bad)":""}">coverage: ${esc(s.coverage_note)}</span>` : "";
    return `<div class="hist-sub">
      <span class="hs-t">${esc(s.title)}</span>
      <span class="${cls}">${esc(s.status)} · gate ${esc(go)}</span>
      ${ranChip(s)}
      <span class="hm">${s.attempts}× · ${s.elapsed!=null?s.elapsed+"s":"—"}${flags?` · ${esc(flags)}`:""}</span>
      ${cov}
    </div>`;
  }).join("") || `<div class="tl-step tl-dim">no subtasks recorded</div>`;
}
async function toggleHist(id){
  if(crewHist.open.has(id)){ crewHist.open.delete(id); }
  else {
    crewHist.open.add(id);
    if(!crewHist.detail[id]){
      try{ crewHist.detail[id]=await getJSON("/api/crew/history/"+id); }catch{}
    }
  }
  crewHist.sig=null;        // force a re-render
  pollHistory();
}
async function crewApprove(id, ok){
  let note="";
  if(!ok){ note=window.prompt("Why deny / what to do instead? (optional)","")||""; }
  try{ await post(`/api/crew/runs/${id}/approve`,{approved:ok,note}); }catch{}
  pollCrew();
}
async function crewCancel(id){ if(!confirm("Stop this crew run?")) return; try{ await post(`/api/crew/runs/${id}/cancel`); }catch{} pollCrew(); }

/* ============================ token gate =============================== */
function gate(msg){
  document.getElementById("app").innerHTML=`
    <div class="gate"><h2>Control Panel</h2><p>Enter your access token.</p>
      <input id="tok" type="password" placeholder="access token" autofocus />
      <button class="primary" id="go" style="width:100%;margin-top:14px">Connect</button>
      <div class="err">${msg||""}</div></div>`;
  $("#go").onclick=async ()=>{ setToken($("#tok").value.trim()); start(); };
  $("#tok").onkeydown=e=>{ if(e.key==="Enter") $("#go").click(); };
}
async function verify(){ try{ const r=await fetch("/api/stats",{headers:H()}); return r.ok; }catch{ return false; } }

/* ===================== WebGL molten-metal hero background ===================== */
function initGLBG(){
  const cv=document.getElementById("gl-bg"); if(!cv) return;
  let gl; try{ gl=cv.getContext("webgl")||cv.getContext("experimental-webgl"); }catch(e){}
  if(!gl) return;
  const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const fs=`precision highp float; uniform vec2 uRes; uniform float uTime;
  float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
  float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
    float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
    return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
  float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.03;a*=.5;}return v;}
  float hf(vec2 p,vec2 r){return fbm(p*1.35+r*1.7);}
  void main(){
    vec2 res=uRes; vec2 p=(gl_FragCoord.xy-.5*res)/res.y; float t=uTime*0.05;
    vec2 q=vec2(fbm(p*1.3+vec2(0.,t)),fbm(p*1.3+vec2(5.2,1.3-t)));
    vec2 r=vec2(fbm(p*1.3+q*1.4+vec2(1.7,9.2)+t*.5),fbm(p*1.3+q*1.4+vec2(8.3,2.8)-t*.4));
    float h=hf(p,r); float e=.0028;
    float hx=hf(p+vec2(e,0.),r), hy=hf(p+vec2(0.,e),r);
    vec2 grad=vec2(hx-h,hy-h)/e;
    vec3 n=normalize(vec3(-grad*0.17,1.0));
    vec3 V=vec3(0.,0.,1.);
    vec3 L1=normalize(vec3(.5,.72,.55));      // warm key
    vec3 L2=normalize(vec3(-.55,-.3,.78));    // cool counter (chrome), shallower
    float d1=clamp(dot(n,L1),0.,1.);
    float s1=pow(clamp(dot(reflect(-L1,n),V),0.,1.),60.);
    float s2=pow(clamp(dot(reflect(-L2,n),V),0.,1.),120.);
    float fres=pow(1.-clamp(n.z,0.,1.),3.2);
    vec3 base=mix(vec3(.04,.03,.024), vec3(.58,.35,.12), smoothstep(.18,1.0,h));
    vec3 col=base*(0.5+0.7*d1);
    col+=vec3(1.,.83,.52)*s1*2.2;             // hot amber highlight
    col+=vec3(.7,.8,1.)*s2*0.7;               // restrained chrome counter-highlight
    col+=vec3(.22,.14,.36)*fres*.42;          // violet rim
    col+=vec3(.55,.34,.12)*smoothstep(1.0,0.0,length(p))*0.14;  // soft central focal glow
    float vig=smoothstep(1.55,.15,length(p));
    col*=.52+.68*vig;
    col+=(hash(gl_FragCoord.xy+uTime)-.5)*.011;
    gl_FragColor=vec4(col,1.);
  }`;
  function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.warn("gl",gl.getShaderInfoLog(s));return null;}return s;}
  const v=sh(gl.VERTEX_SHADER,vs),f=sh(gl.FRAGMENT_SHADER,fs); if(!v||!f) return;
  const prog=gl.createProgram();gl.attachShader(prog,v);gl.attachShader(prog,f);gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){console.warn("gl-link",gl.getProgramInfoLog(prog));return;}
  gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,"p");gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const uRes=gl.getUniformLocation(prog,"uRes"),uTime=gl.getUniformLocation(prog,"uTime");
  const DPR=0.6;
  function resize(){cv.width=Math.max(2,Math.floor(innerWidth*DPR));cv.height=Math.max(2,Math.floor(innerHeight*DPR));gl.viewport(0,0,cv.width,cv.height);}
  resize(); addEventListener("resize",resize);
  const t0=performance.now(); let last=0;
  function frame(now){ requestAnimationFrame(frame);
    if(now-last<32) return; last=now;          // ~30fps cap (light on the GPU vs Ollama)
    gl.uniform2f(uRes,cv.width,cv.height); gl.uniform1f(uTime,(now-t0)/1000);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4); }
  requestAnimationFrame(frame);
}

/* ============================== startup =============================== */
async function start(){
  // One-time migration to the redesigned theme set: clear the transient auto-defaults
  // ("aurora"/"amber") so the new Graphite default shows. Deliberate picks still stick.
  if(!localStorage.getItem("pcp_theme_v3")){
    const t=localStorage.getItem("pcp_theme");
    if(t==="aurora"||t==="amber"||!THEMES[t]) localStorage.removeItem("pcp_theme");
    localStorage.setItem("pcp_theme_v3","1");
  }
  applyTheme(currentTheme());
  try{ await (await fetch("/api/health")).json(); }catch{}
  fleetAvailable = false;   // coder-crew has no fleet/foreman; runs locally, no auth gate
  shell();
}
start();
